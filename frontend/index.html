<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orchestration</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --text:      #e6edf3;
      --dim:       #8b949e;
      --green:     #3fb950;
      --blue:      #388bfd;
      --yellow:    #d29922;
      --red:       #f85149;
      --purple:    #bc8cff;
      --orange:    #ffa657;
      --teal:      #39c5cf;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; overflow: hidden; }

    .mi { font-family: 'Material Symbols Outlined'; font-size: 16px; line-height: 1;
          font-weight: normal; font-style: normal; letter-spacing: normal;
          text-transform: none; white-space: nowrap; word-wrap: normal;
          direction: ltr; -webkit-font-feature-settings: 'liga'; font-feature-settings: 'liga';
          -webkit-font-smoothing: antialiased; user-select: none; }
    .mi-sm { font-size: 14px; }
    .mi-xs { font-size: 12px; }

    /* ── layout ── */
    .root { display: grid; grid-template-rows: 48px auto 1fr; height: 100vh; }
    .tab-content { overflow: hidden; display: flex; flex-direction: column; }

    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-title { font-weight: 600; font-size: 15px; letter-spacing: -.2px; color: var(--text);
                    white-space: nowrap; display: flex; align-items: center; gap: 6px; }
    .header-title .mi { color: var(--blue); font-size: 18px; }
    .header-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .repo-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 5px 10px; border-radius: 6px;
      font-size: 12px; font-family: 'Consolas', monospace;
      outline: none; min-width: 0;
    }
    .repo-input:focus { border-color: var(--blue); }
    .repo-input::placeholder { color: var(--dim); }
    .conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0; transition: background .3s;
    }
    .conn-dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .conn-dot.off { background: var(--dim); }

    .body { display: grid; grid-template-columns: 264px 1fr; overflow: hidden; }

    /* ── sidebar ── */
    .sidebar {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .sidebar-section-heading {
      padding: 9px 14px 7px;
      font-size: 10px; font-weight: 600; letter-spacing: .8px;
      color: var(--dim); text-transform: uppercase;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
    }
    .sidebar-section-heading .mi { font-size: 13px; }

    /* action strip under pipeline heading */
    .pipeline-actions {
      display: flex; gap: 6px; padding: 7px 10px 4px; flex-shrink: 0;
    }
    .action-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
      padding: 5px 8px; border-radius: 6px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid; transition: background .15s, border-color .15s;
    }
    .action-btn .mi { font-size: 14px; }
    .action-btn--new  { background: rgba(56,139,253,.1); border-color: rgba(56,139,253,.3); color: var(--blue); }
    .action-btn--new:hover  { background: rgba(56,139,253,.2); border-color: var(--blue); }
    .action-btn--resume { background: rgba(63,185,80,.1); border-color: rgba(63,185,80,.3); color: var(--green); }
    .action-btn--resume:hover { background: rgba(63,185,80,.2); border-color: var(--green); }
    .action-btn--queue  { background: rgba(210,153,34,.1); border-color: rgba(210,153,34,.3); color: var(--yellow); }
    .action-btn--queue:hover { background: rgba(210,153,34,.2); border-color: var(--yellow); }
    .action-btn:disabled { opacity: .4; cursor: default; }

    /* ── tab bar ── */
    .tab-bar {
      display: flex; align-items: stretch; gap: 0;
      padding: 0 12px; border-bottom: 1px solid var(--border);
      background: var(--surface); overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 36px; border: none; background: none;
      color: var(--dim); cursor: pointer; font-size: 12.5px; font-weight: 500;
      border-bottom: 2px solid transparent; white-space: nowrap;
      transition: color .12s, border-color .12s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--blue); }
    .tab-btn--add { color: var(--dim); font-size: 11px; margin-left: 4px; }
    .tab-btn--add:hover { color: var(--green); }
    .tab-item { display: flex; align-items: center; position: relative; }
    .tab-close { display: none; padding: 0 2px; margin-left: 2px; color: var(--dim);
                 background: none; border: none; cursor: pointer; line-height: 1;
                 font-size: 13px; border-radius: 3px; }
    .tab-item:hover .tab-close { display: flex; align-items: center; }
    .tab-close:hover { color: var(--red); background: rgba(248,81,73,.15); }
    .tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tab-dot--running { background: var(--green); box-shadow: 0 0 4px var(--green); animation: pulse 1.2s ease-in-out infinite; }
    .tab-dot--queued  { background: var(--yellow); }
    .tab-dot--done    { background: var(--dim); }
    .tab-dot--failed  { background: var(--red); }
    .tab-dot--idle    { background: var(--border); }
    .tab-id { font-family: monospace; font-size: 10px; color: var(--dim);
               background: var(--surface2); padding: 1px 5px; border-radius: 3px; }

    /* ── status pill ── */
    .status-pill { font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 9px;
                   letter-spacing: .3px; text-transform: uppercase; }
    .status-pill--running { color: var(--green); background: rgba(63,185,80,.12); }
    .status-pill--queued  { color: var(--yellow); background: rgba(210,153,34,.12); }
    .status-pill--done    { color: var(--dim);    background: rgba(139,148,158,.1); }
    .status-pill--failed  { color: var(--red);    background: rgba(248,81,73,.12); }

    /* ── pipeline tab header ── */
    .pipeline-tab-header {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .pipeline-tab-header .repo-label {
      font-size: 11px; color: var(--dim); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; flex: 1;
      font-family: 'Consolas', monospace;
    }
    .queued-hint {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--yellow); padding: 4px 10px 2px;
      opacity: .8;
    }

    /* ── pipeline runtime controls ── */
    .pipeline-controls {
      display: flex; gap: 4px; margin-left: auto; flex-shrink: 0;
    }
    .ctrl-btn {
      display: flex; align-items: center; gap: 2px;
      padding: 3px 7px; border-radius: 5px; font-size: 11px; font-weight: 500;
      cursor: pointer; border: 1px solid; transition: background .15s;
    }
    .ctrl-btn .mi { font-size: 13px; }
    .ctrl-btn--pause  { background: rgba(210,153,34,.1); border-color: rgba(210,153,34,.3); color: var(--yellow); }
    .ctrl-btn--pause:hover  { background: rgba(210,153,34,.25); }
    .ctrl-btn--resume { background: rgba(63,185,80,.1);  border-color: rgba(63,185,80,.3);  color: var(--green); }
    .ctrl-btn--resume:hover { background: rgba(63,185,80,.25); }
    .ctrl-btn--stop   { background: rgba(248,81,73,.1);  border-color: rgba(248,81,73,.3);  color: var(--red); }
    .ctrl-btn--stop:hover   { background: rgba(248,81,73,.25); }
    /* ── step group nodes ── */
    .pg-step-group {
      border: 1px solid var(--border); border-radius: 7px;
      margin: 2px 0; overflow: hidden;
    }
    .pg-step-group-header {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; background: var(--surface2);
      font-size: 11px; font-weight: 600; color: var(--dim);
      cursor: pointer; user-select: none;
    }
    .pg-step-group-header:hover { background: var(--border); }
    .pg-step-group-header .mi { font-size: 13px; }
    .pg-step-group-body { padding: 2px 4px 4px; }
    .pg-step-group-body .pg-node { border-radius: 5px; margin: 2px 0; }

    .agent-ctrl { display: flex; gap: 3px; margin-left: auto; }
    .agent-ctrl-btn {
      padding: 2px 5px; border-radius: 4px; font-size: 10px; font-weight: 500;
      cursor: pointer; border: 1px solid; line-height: 1.4; transition: background .12s;
    }
    .agent-ctrl-btn--skip    { background: rgba(210,153,34,.1); border-color: rgba(210,153,34,.3); color: var(--yellow); }
    .agent-ctrl-btn--skip:hover    { background: rgba(210,153,34,.25); }
    .agent-ctrl-btn--restart { background: rgba(56,139,253,.1);  border-color: rgba(56,139,253,.3); color: var(--blue); }
    .agent-ctrl-btn--restart:hover { background: rgba(56,139,253,.25); }

    /* ── overview tab ── */
    .overview-tab { padding: 24px 28px; overflow-y: auto; flex: 1; }
    .overview-heading { font-size: 14px; font-weight: 600; margin: 0 0 16px; color: var(--text); }
    .overview-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .overview-table th {
      color: var(--dim); font-weight: 600; text-align: left;
      padding: 6px 14px; border-bottom: 1px solid var(--border);
      font-size: 10px; letter-spacing: .5px; text-transform: uppercase;
    }
    .overview-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .overview-row { cursor: pointer; transition: background .1s; }
    .overview-row:hover td { background: var(--surface2); }
    .overview-task { color: var(--dim); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .overview-empty { color: var(--dim); font-size: 13px; padding: 32px 0; text-align: center; }
    .overview-agents { font-family: monospace; font-size: 11px; color: var(--blue); }

    /* ── agent pre-prompt (queued pipeline) ── */
    .agent-preprompt {
      display: block; width: 100%; margin-top: 5px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-size: 11px; font-family: 'Segoe UI', sans-serif;
      border-radius: 5px; padding: 5px 7px; resize: vertical; min-height: 44px;
      box-sizing: border-box; line-height: 1.5;
    }
    .agent-preprompt:focus { outline: none; border-color: var(--blue); }
    .preprompt-label { display: block; font-size: 9px; color: var(--dim); margin-top: 4px;
                        letter-spacing: .5px; text-transform: uppercase; }

    /* ── pre-prompt section inside modal ── */
    .modal-preprompts { display: flex; flex-direction: column; gap: 8px; max-height: 220px; overflow-y: auto; }
    .modal-preprompt-row label { font-size: 11px; color: var(--dim); font-weight: 600; }

    /* ── pipeline graph (scrollable middle section) ── */
    .pipeline-graph { overflow-y: auto; flex: 1; padding: 6px 8px 8px; min-height: 0; }
    .pipeline-graph::-webkit-scrollbar { width: 4px; }
    .pipeline-graph::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .pg-section-label {
      font-size: 10px; font-weight: 600; letter-spacing: .6px; color: var(--dim);
      text-transform: uppercase; padding: 10px 4px 5px;
    }

    .pg-node {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 8px 6px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface2);
      cursor: pointer; transition: border-color .2s, background .15s, opacity .2s;
    }
    .pg-node:hover { background: #252c38; }
    .pg-node.selected { box-shadow: 0 0 0 2px var(--blue); }
    .pg-node--in_progress { border-color: var(--blue); background: rgba(56,139,253,.07); }
    .pg-node--done        { border-color: rgba(63,185,80,.4); background: rgba(63,185,80,.04); }
    .pg-node--failed      { border-color: var(--red); background: rgba(248,81,73,.05); }
    .pg-node--stopped     { border-color: rgba(139,148,158,.4); background: rgba(139,148,158,.05); opacity: .6; }
    .pg-node--skipped     { opacity: .4; border-style: dashed; }

    .pg-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      background: var(--border);
    }
    .pg-node--in_progress .pg-dot {
      background: var(--blue); box-shadow: 0 0 5px var(--blue);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .pg-node--done    .pg-dot { background: var(--green); }
    .pg-node--failed  .pg-dot { background: var(--red); }
    .pg-node--stopped .pg-dot { background: var(--dim); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .pg-info { flex: 1; min-width: 0; }
    .pg-name { font-size: 12px; font-weight: 500; color: var(--text); }
    .pg-sub  { font-size: 10px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    .pg-badge {
      font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 8px;
      flex-shrink: 0; text-transform: uppercase; letter-spacing: .3px;
    }
    .pg-badge--idle        { background: transparent; color: var(--dim); }
    .pg-badge--in_progress { background: rgba(56,139,253,.15); color: var(--blue); }
    .pg-badge--done        { background: rgba(63,185,80,.15);  color: var(--green); }
    .pg-badge--failed      { background: rgba(248,81,73,.15);  color: var(--red); }

    .skip-btn {
      background: none; border: none; color: var(--dim); cursor: pointer;
      padding: 2px; border-radius: 4px; line-height: 1; flex-shrink: 0;
      transition: color .15s, background .15s;
      display: flex; align-items: center;
    }
    .skip-btn:hover { color: var(--text); background: var(--surface); }
    .skip-btn.skipped { color: var(--orange); }
    .skip-btn .mi { font-size: 15px; }

    .pg-connector {
      display: flex; flex-direction: column; align-items: center;
      height: 14px; flex-shrink: 0;
    }
    .pg-connector-line  { width: 1px; flex: 1; background: var(--border); }
    .pg-connector-arrow {
      width: 0; height: 0;
      border-left: 3px solid transparent;
      border-right: 3px solid transparent;
      border-top: 4px solid var(--border);
    }
    .pg-connector--done .pg-connector-line  { background: rgba(63,185,80,.4); }
    .pg-connector--done .pg-connector-arrow { border-top-color: rgba(63,185,80,.4); }
    .pg-connector--in_progress .pg-connector-line  { background: var(--blue); }
    .pg-connector--in_progress .pg-connector-arrow { border-top-color: var(--blue); }

    /* ── consultant section (pinned bottom of sidebar) ── */
    .consultant-section {
      flex-shrink: 0; border-top: 1px solid var(--border);
    }
    .consultant-card {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .15s, border-color .15s;
    }
    .consultant-card:hover { background: var(--surface2); }
    .consultant-card.selected { background: var(--surface2); border-left-color: var(--teal); }
    .consultant-icon { color: var(--teal); display: flex; align-items: center; flex-shrink: 0; }
    .consultant-icon .mi { font-size: 18px; }
    .consultant-info { flex: 1; min-width: 0; }
    .consultant-name { font-size: 12.5px; font-weight: 600; color: var(--text); }
    .consultant-sub  { font-size: 10px; color: var(--dim); margin-top: 1px;
                        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .consultant-badge {
      font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 8px;
      flex-shrink: 0; text-transform: uppercase; letter-spacing: .3px;
    }
    .consultant-badge--idle        { background: transparent; color: var(--dim); }
    .consultant-badge--in_progress { background: rgba(57,197,207,.15); color: var(--teal);  }
    .consultant-badge--done        { background: rgba(57,197,207,.1);  color: var(--teal);  }
    .consultant-badge--failed      { background: rgba(248,81,73,.15);  color: var(--red);   }
    .consultant-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0;
    }
    .consultant-dot.in_progress {
      background: var(--teal); box-shadow: 0 0 5px var(--teal);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .consultant-dot.done   { background: var(--teal); }
    .consultant-dot.failed { background: var(--red); }

    /* ── modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; width: 480px; max-width: calc(100vw - 32px);
      padding: 22px 24px; display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .modal-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .modal label  { font-size: 11px; font-weight: 600; color: var(--dim); letter-spacing: .4px; }
    .modal-field  { display: flex; flex-direction: column; gap: 6px; }
    .modal input, .modal textarea {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 7px 10px; border-radius: 6px; font-size: 13px;
      font-family: 'Consolas', monospace; outline: none; width: 100%;
    }
    .modal input:focus, .modal textarea:focus { border-color: var(--blue); }
    .modal textarea { min-height: 100px; resize: vertical; font-family: 'Segoe UI', sans-serif; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .btn-cancel {
      padding: 6px 16px; background: var(--surface2); border: 1px solid var(--border);
      color: var(--dim); border-radius: 6px; font-size: 13px; cursor: pointer;
    }
    .btn-cancel:hover { color: var(--text); }
    .btn-primary {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 18px; background: var(--blue); border: none;
      color: #fff; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-primary:hover { background: #4f9cff; }
    .btn-primary:disabled { opacity: .45; cursor: default; }
    .modal-status { font-size: 12px; color: var(--green); min-height: 18px; }

    /* skip chips in modal */
    .skip-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .skip-chip {
      padding: 3px 10px; border-radius: 12px; font-size: 11px; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface2); color: var(--dim);
      transition: background .15s, color .15s, border-color .15s;
    }
    .skip-chip.active { background: rgba(255,166,87,.12); border-color: rgba(255,166,87,.4); color: var(--orange); }

    /* ── right panel ── */
    .right-panel { display: flex; flex-direction: column; overflow: hidden; }

    /* ── stream header ── */
    .stream-header {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .stream-header-title {
      font-size: 10px; font-weight: 600; letter-spacing: .7px;
      color: var(--dim); text-transform: uppercase; margin-right: 2px;
    }
    .agent-filter {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 2px 8px; border-radius: 4px; font-size: 11px;
      font-family: 'Consolas', monospace; outline: none; flex: 1; max-width: 160px;
    }
    .agent-filter:focus { border-color: var(--blue); }
    .icon-btn {
      background: none; border: 1px solid var(--border); color: var(--dim);
      padding: 2px 6px; border-radius: 4px; cursor: pointer;
      display: flex; align-items: center; gap: 3px;
      font-size: 11px; transition: color .15s, border-color .15s;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--dim); }
    .icon-btn.active { color: var(--blue); border-color: rgba(56,139,253,.4); }
    .icon-btn .mi { font-size: 14px; }

    /* ── stream ── */
    .stream-panel {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      font-family: 'Consolas', 'Monaco', monospace; font-size: 12.5px; line-height: 1.6;
      min-height: 0;
    }
    .stream-panel::-webkit-scrollbar { width: 4px; }
    .stream-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .stream-empty {
      height: 100%; display: flex; align-items: center; justify-content: center;
      color: var(--dim); font-family: 'Segoe UI', sans-serif; font-size: 13px;
    }

    .entry { margin-bottom: 6px; }
    .entry-separator {
      color: var(--dim); font-size: 11px; padding: 6px 0 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .entry-separator::before, .entry-separator::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .entry-thinking .thinking-header { color: var(--dim); font-size: 11px; margin-bottom: 3px; }
    .entry-thinking .thinking-body   { color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .entry-tool { color: var(--purple); padding: 1px 0; }
    .entry-tool .ts        { color: var(--dim); font-size: 11px; margin-right: 6px; }
    .entry-tool .agent-tag { color: var(--dim); margin-right: 4px; }
    .entry-done   { color: var(--green); font-size: 11px; padding: 2px 0; }
    .entry-failed { color: var(--red);   font-size: 11px; padding: 2px 0; }
    .entry-interrupt { color: var(--orange); padding: 1px 0; font-style: italic; }
    .entry-interrupt .ts   { color: var(--dim);    font-size: 11px; margin-right: 6px; }
    .entry-interrupt .itag { color: var(--yellow); margin-right: 4px; font-style: normal; }
    .entry-message { padding: 4px 0 6px; }
    .entry-message .msg-header { color: var(--dim); font-size: 11px; margin-bottom: 4px; }
    .entry-message .msg-body   { color: var(--text); white-space: pre-wrap; word-break: break-word; line-height: 1.7; }

    /* ── output drawer ── */
    .drawer {
      border-top: 1px solid var(--border); background: var(--surface);
      display: flex; flex-direction: column; height: 270px; flex-shrink: 0;
    }
    .drawer-header {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .drawer-title { font-size: 11px; font-weight: 600; color: var(--dim);
                    text-transform: uppercase; letter-spacing: .6px; flex: 1; }
    .file-select {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 3px 8px; border-radius: 5px; font-size: 12px;
      font-family: 'Consolas', monospace; outline: none; flex: 1; max-width: 300px;
    }
    .file-select:focus { border-color: var(--blue); }
    .drawer-close {
      background: none; border: none; color: var(--dim); cursor: pointer;
      padding: 2px 4px; border-radius: 4px; display: flex; align-items: center;
    }
    .drawer-close:hover { background: var(--surface2); color: var(--text); }
    .drawer-body {
      flex: 1; overflow-y: auto; padding: 10px 14px;
      font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word; color: var(--text);
    }
    .drawer-body::-webkit-scrollbar { width: 4px; }
    .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .drawer-placeholder { color: var(--dim); font-family: 'Segoe UI', sans-serif; }

    /* ── compose bar ── */
    .compose-bar {
      border-top: 1px solid var(--border); background: var(--surface);
      display: flex; align-items: center; gap: 7px;
      padding: 7px 12px; flex-shrink: 0;
    }
    .compose-target {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 5px;
      border: 1px solid var(--border); background: var(--bg);
      font-size: 11px; font-weight: 600; white-space: nowrap; flex-shrink: 0;
      min-width: 80px; color: var(--dim);
    }
    .compose-target.has-target { border-color: rgba(56,139,253,.4); color: var(--blue); }
    .compose-target.is-consultant { border-color: rgba(57,197,207,.4); color: var(--teal); }
    .compose-target .mi { font-size: 13px; }
    .compose-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 4px 10px; border-radius: 5px;
      font-size: 13px; outline: none; min-width: 0;
    }
    .compose-input:focus { border-color: var(--blue); }
    .compose-input::placeholder { color: var(--dim); }
    .compose-send {
      display: flex; align-items: center; gap: 4px;
      background: var(--surface2); border: 1px solid var(--border); color: var(--dim);
      padding: 4px 12px; border-radius: 5px; font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: color .15s, border-color .15s;
    }
    .compose-send:hover:not(:disabled) { color: var(--text); border-color: var(--dim); }
    .compose-send:disabled { opacity: .35; cursor: default; }
    .compose-send .mi { font-size: 14px; }
    .compose-run {
      display: flex; align-items: center; gap: 4px;
      background: rgba(56,139,253,.12); border: 1px solid rgba(56,139,253,.3);
      color: var(--blue); padding: 4px 12px; border-radius: 5px;
      font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background .15s;
    }
    .compose-run:hover:not(:disabled) { background: rgba(56,139,253,.22); border-color: var(--blue); }
    .compose-run:disabled { opacity: .35; cursor: default; }
    .compose-run .mi { font-size: 14px; }

    /* ── planning mode toggle ── */
    .plan-toggle {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid; transition: background .15s, border-color .15s, color .15s;
    }
    .plan-toggle .mi { font-size: 15px; }
    .plan-toggle--off { background: transparent; border-color: var(--border); color: var(--dim); }
    .plan-toggle--off:hover { border-color: var(--purple); color: var(--purple); }
    .plan-toggle--on  { background: rgba(188,140,255,.12); border-color: rgba(188,140,255,.35); color: var(--purple); }

    /* ── planning modal ── */
    .plan-modal {
      width: 660px; max-width: calc(100vw - 32px);
      max-height: 84vh; min-height: 400px;
      display: flex; flex-direction: column; gap: 0;
      padding: 0; overflow: hidden;
    }
    .plan-modal-header {
      display: flex; align-items: center; gap: 8px;
      padding: 18px 22px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .plan-modal-title { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
    .plan-type-badge {
      font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      text-transform: uppercase; letter-spacing: .5px;
      background: rgba(188,140,255,.12); color: var(--purple); border: 1px solid rgba(188,140,255,.25);
    }
    .plan-prompt-box {
      margin: 12px 22px 0; padding: 9px 12px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
      font-size: 11.5px; color: var(--dim); line-height: 1.55; flex-shrink: 0;
      max-height: 80px; overflow-y: auto;
    }
    .plan-prompt-label { font-size: 9px; font-weight: 700; color: var(--dim); letter-spacing: .6px;
                          text-transform: uppercase; margin-bottom: 4px; display: block; }
    .plan-chat {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
      padding: 14px 22px; min-height: 0;
    }
    .plan-chat::-webkit-scrollbar { width: 4px; }
    .plan-chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .plan-msg {
      max-width: 88%; padding: 9px 13px; border-radius: 9px;
      font-size: 13px; line-height: 1.65; white-space: pre-wrap; word-break: break-word;
    }
    .plan-msg--user {
      align-self: flex-end;
      background: rgba(56,139,253,.12); border: 1px solid rgba(56,139,253,.22); color: var(--text);
    }
    .plan-msg--assistant {
      align-self: flex-start;
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    }
    .plan-thinking {
      align-self: flex-start; color: var(--dim); font-size: 11.5px;
      display: flex; align-items: center; gap: 6px; padding: 4px 0;
    }
    .plan-thinking .mi { font-size: 14px; animation: pulse 1.4s ease-in-out infinite; }
    .plan-input-row {
      display: flex; gap: 7px; padding: 10px 22px 16px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .plan-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 7px 11px; border-radius: 6px;
      font-size: 13px; outline: none;
    }
    .plan-input:focus { border-color: var(--blue); }
    .plan-input::placeholder { color: var(--dim); }
    .plan-finalize-section { padding: 10px 22px 18px; display: flex; flex-direction: column; gap: 10px; }
    .plan-finalize-label { font-size: 10px; font-weight: 700; color: var(--dim); letter-spacing: .5px; text-transform: uppercase; }
    .plan-final-textarea {
      width: 100%; min-height: 140px; background: var(--bg);
      border: 1px solid rgba(63,185,80,.35); color: var(--text);
      padding: 10px 13px; border-radius: 7px; font-size: 13px;
      font-family: 'Segoe UI', sans-serif; resize: vertical; outline: none; line-height: 1.65;
      box-sizing: border-box;
    }
    .plan-final-textarea:focus { border-color: var(--green); }
    .plan-actions-row {
      display: flex; gap: 8px; align-items: center;
    }
    .btn-plan-back {
      padding: 6px 14px; background: var(--surface2); border: 1px solid var(--border);
      color: var(--dim); border-radius: 6px; font-size: 12px; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
    }
    .btn-plan-back:hover { color: var(--text); }
    .btn-plan-back .mi { font-size: 14px; }
    .btn-plan-generate {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 16px; background: rgba(188,140,255,.12); border: 1px solid rgba(188,140,255,.35);
      color: var(--purple); border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
      margin-left: auto;
    }
    .btn-plan-generate:hover { background: rgba(188,140,255,.22); }
    .btn-plan-generate:disabled { opacity: .4; cursor: default; }
    .btn-plan-generate .mi { font-size: 14px; }
    .btn-plan-run {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 18px; background: var(--green); border: none;
      color: #000; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer;
      margin-left: auto;
    }
    .btn-plan-run:hover { background: #4ecb6a; }
    .btn-plan-run:disabled { opacity: .45; cursor: default; }
    .btn-plan-run .mi { font-size: 14px; }
    .plan-status { font-size: 11.5px; color: var(--red); min-height: 18px; padding: 0 22px 8px; flex-shrink: 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { h, render }                              from 'https://esm.sh/preact@10.23.2';
import { useState, useEffect, useRef, useCallback, useMemo } from 'https://esm.sh/preact@10.23.2/hooks';
import htm                                         from 'https://esm.sh/htm@3.1.1';

const html = htm.bind(h);
const MAX_STREAM = 600;
const API = '';

function fmtTime(iso) { return new Date(iso).toTimeString().slice(0, 8); }
function shortPath(p) {
  if (!p) return '';
  const parts = p.replace(/\\/g, '/').split('/').filter(Boolean);
  return parts[parts.length - 1] || p;
}

const LABEL = { idle: 'idle', queued: 'queued', in_progress: 'running', done: 'done', failed: 'failed', stopped: 'stopped' };

const PIPELINE_AGENTS = [
  "architect", "designer", "planner", "scaffolder",
  "tester", "reviewer", "test-generator", "coder",
  "qa-tester", "code-reviewer", "commit", "documentation",
];
const PIPELINE_SET = new Set(PIPELINE_AGENTS);

const ALL_AGENTS = [
  ...PIPELINE_AGENTS,
  "query-planner", "searcher", "reader", "tech-auditor",
  "research-synthesizer", "research-analyst", "action-planner",
  "oss-scout", "issue-auditor", "contribution-planner",
];

// ── PlanningModal ─────────────────────────────────────────────────────────────

function PlanningModal({ pendingPipeline, onClose, onCreated }) {
  const { mode, formData } = pendingPipeline;
  const pipelineType = mode === 'research' ? 'research' : mode === 'scout' ? 'scout' : mode === 'custom' ? 'custom' : mode === 'queue' ? 'dev (queued)' : 'dev';
  const initialPrompt = formData.desc;

  const [messages,    setMessages]    = useState([]);
  const [input,       setInput]       = useState('');
  const [streaming,   setStreaming]   = useState(false);
  const [streamText,  setStreamText]  = useState('');
  const [phase,       setPhase]       = useState('chat'); // 'chat' | 'finalize'
  const [finalPlan,   setFinalPlan]   = useState('');
  const [submitting,  setSubmitting]  = useState(false);
  const [status,      setStatus]      = useState('');
  const chatEndRef = useRef(null);

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, streamText]);

  const doStream = async (msgs, finalize = false) => {
    setStreaming(true); setStreamText('');
    let full = '';
    try {
      const resp = await fetch('/planning/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pipeline_type: pipelineType, initial_prompt: initialPrompt, messages: msgs, finalize }),
      });
      const reader = resp.body.getReader(); const dec = new TextDecoder();
      while (true) {
        const { done, value } = await reader.read(); if (done) break;
        for (const line of dec.decode(value).split('\n')) {
          if (!line.startsWith('data: ')) continue;
          try {
            const ev = JSON.parse(line.slice(6));
            if (ev.text)  { full += ev.text; setStreamText(full); }
            if (ev.error) setStatus(`Error: ${ev.error}`);
          } catch {}
        }
      }
    } catch (e) { setStatus(`Error: ${e.message}`); }
    finally { setStreaming(false); setStreamText(''); }
    return full;
  };

  // Kick off: send initial prompt as user, get first response
  useEffect(() => {
    (async () => {
      const initMsgs = [{ role: 'user', content: initialPrompt }];
      const text = await doStream(initMsgs);
      setMessages([{ role: 'user', content: initialPrompt }, { role: 'assistant', content: text }]);
    })();
  }, []);

  const sendMessage = async () => {
    if (!input.trim() || streaming) return;
    const userMsg = input.trim(); setInput('');
    const newMsgs = [...messages, { role: 'user', content: userMsg }];
    setMessages(newMsgs);
    const text = await doStream(newMsgs);
    setMessages(m => [...m, { role: 'assistant', content: text }]);
  };

  const generatePlan = async () => {
    const text = await doStream(messages, true);
    setFinalPlan(text); setPhase('finalize');
  };

  const runPipeline = async () => {
    if (!finalPlan.trim() || submitting) return;
    setSubmitting(true); setStatus('');
    try {
      const desc = finalPlan.trim();
      let endpoint, body;
      if (mode === 'research') {
        endpoint = '/research/run';
        body = { repo_path: formData.repo, description: desc, queue_dev: formData.queueDev, dev_description: formData.devDesc || desc };
      } else if (mode === 'scout') {
        endpoint = '/scout/run';
        body = { repo_path: formData.repo, description: desc, queue_dev: formData.queueDev, dev_description: formData.devDesc || desc };
      } else if (mode === 'custom') {
        endpoint = '/custom/run';
        body = { repo_path: formData.repo, description: desc, steps: formData.steps, queue_dev: formData.queueDev, dev_description: formData.devDesc || desc, handoff_files: formData.handoffFiles };
      } else if (mode === 'queue') {
        endpoint = '/pipeline/queue';
        body = { repo_path: formData.repo, description: desc, skip_agents: formData.skipped ?? [], agent_overrides: formData.overrides ?? {}, ...(formData.passOutputs && formData.sourcePipelineId ? { source_pipeline_id: formData.sourcePipelineId } : {}) };
      } else {
        endpoint = '/pipeline/run';
        body = { repo_path: formData.repo, description: desc, skip_agents: formData.skipped ?? [] };
      }
      const r = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail ?? 'Server error');
      onCreated(d.pipeline_id, formData.repo, desc, mode === 'queue', new Set(formData.skipped ?? []), formData.overrides ?? {});
    } catch (e) { setStatus(`Error: ${e.message}`); setSubmitting(false); }
  };

  const onKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  return html`
    <div class="modal-overlay" onClick=${e => e.target === e.currentTarget && onClose()}>
      <div class="modal plan-modal">

        <div class="plan-modal-header">
          <span class="mi" style="color:var(--purple);font-size:18px">psychology</span>
          <div class="plan-modal-title">Planning Session</div>
          <span class="plan-type-badge">${pipelineType}</span>
          <button style="background:none;border:none;cursor:pointer;color:var(--dim);padding:2px 4px;border-radius:4px;display:flex;align-items:center" onClick=${onClose} title="Cancel">
            <span class="mi">close</span>
          </button>
        </div>

        <div class="plan-prompt-box">
          <span class="plan-prompt-label">Initial prompt</span>
          ${initialPrompt}
        </div>

        ${phase === 'chat' && html`
          <div class="plan-chat">
            ${messages.slice(1).map((m, i) => html`
              <div key=${i} class=${`plan-msg plan-msg--${m.role}`}>${m.content}</div>
            `)}
            ${streaming && streamText && html`
              <div class="plan-msg plan-msg--assistant">${streamText}<span style="opacity:.5">▋</span></div>
            `}
            ${streaming && !streamText && html`
              <div class="plan-thinking">
                <span class="mi">more_horiz</span> thinking…
              </div>
            `}
            <div ref=${chatEndRef}></div>
          </div>

          ${status && html`<div class="plan-status">${status}</div>`}

          <div class="plan-input-row">
            <input class="plan-input" type="text" placeholder="Reply…"
              value=${input} onInput=${e => setInput(e.target.value)} onKeyDown=${onKey}
              disabled=${streaming} />
            <button class="btn-primary" onClick=${sendMessage} disabled=${streaming || !input.trim()}>
              <span class="mi mi-sm">send</span>
            </button>
            <button class="btn-plan-generate" onClick=${generatePlan} disabled=${streaming || messages.length < 2}
              title="Generate the final refined task description">
              <span class="mi">auto_fix_high</span> Generate Plan
            </button>
          </div>
        `}

        ${phase === 'finalize' && html`
          <div class="plan-finalize-section">
            <div class="plan-finalize-label">Refined task — edit if needed, then run</div>
            <textarea class="plan-final-textarea"
              value=${finalPlan} onInput=${e => setFinalPlan(e.target.value)}
            ></textarea>
          </div>

          ${status && html`<div class="plan-status">${status}</div>`}

          <div class="plan-input-row" style="border-top:1px solid var(--border)">
            <button class="btn-plan-back" onClick=${() => setPhase('chat')}>
              <span class="mi">arrow_back</span> Back to chat
            </button>
            <button class="btn-plan-run" onClick=${runPipeline} disabled=${submitting || !finalPlan.trim()} style="margin-left:auto">
              <span class="mi">play_arrow</span>
              ${submitting ? 'Starting…' : 'Run Pipeline'}
            </button>
          </div>
        `}
      </div>
    </div>
  `;
}

// ── CustomPipelineModal ───────────────────────────────────────────────────────

function CustomPipelineModal({ defaultRepo, planningMode, onClose, onCreated, onNeedPlanning }) {
  const nextId = useRef(100);
  const uid    = () => ++nextId.current;

  const [repo,         setRepo]         = useState(defaultRepo ?? '');
  const [desc,         setDesc]         = useState('');
  const [steps,        setSteps]        = useState([
    { id: uid(), agents: [{ id: uid(), name: 'architect', preprompt: '' }] }
  ]);
  const [queueDev,     setQueueDev]     = useState(false);
  const [devDesc,      setDevDesc]      = useState('');
  const [handoffFiles, setHandoffFiles] = useState('');
  const [busy,         setBusy]         = useState(false);
  const [status,       setStatus]       = useState('');

  const addStep    = () => setSteps(s => [...s, { id: uid(), agents: [{ id: uid(), name: 'coder', preprompt: '' }] }]);
  const removeStep = sid => setSteps(s => s.filter(st => st.id !== sid));
  const moveStep   = (sid, dir) => setSteps(s => {
    const i = s.findIndex(st => st.id === sid), j = i + dir;
    if (j < 0 || j >= s.length) return s;
    const n = [...s]; [n[i], n[j]] = [n[j], n[i]]; return n;
  });
  const addAgent    = sid => setSteps(s => s.map(st =>
    st.id === sid ? { ...st, agents: [...st.agents, { id: uid(), name: 'coder', preprompt: '' }] } : st
  ));
  const removeAgent = (sid, aid) => setSteps(s => s.map(st =>
    st.id === sid ? { ...st, agents: st.agents.filter(a => a.id !== aid) } : st
  ));
  const updateAgent = (sid, aid, field, val) => setSteps(s => s.map(st =>
    st.id === sid ? { ...st, agents: st.agents.map(a => a.id === aid ? { ...a, [field]: val } : a) } : st
  ));

  const canRun = repo.trim() && desc.trim() && steps.length > 0 && steps.every(s => s.agents.length > 0);

  const submit = async () => {
    if (!canRun) return;
    const formData = {
      mode: 'custom',
      repo: repo.trim(), desc: desc.trim(),
      steps: steps.map(st => ({ agents: st.agents.map(a => ({ name: a.name, preprompt: a.preprompt })) })),
      queueDev, devDesc: devDesc.trim(),
      handoffFiles: handoffFiles.split('\n').map(f => f.trim()).filter(Boolean),
    };
    if (planningMode) { onNeedPlanning(formData); return; }
    setBusy(true); setStatus('');
    try {
      const r = await fetch(`${API}/custom/run`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ repo_path: formData.repo, description: formData.desc, steps: formData.steps, queue_dev: formData.queueDev, dev_description: formData.devDesc, handoff_files: formData.handoffFiles }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail ?? 'Server error');
      onCreated(d.pipeline_id, repo.trim(), desc.trim(), false, new Set(), {});
    } catch (e) { setStatus(`Error: ${e.message}`); setBusy(false); }
  };

  const S = { border: '1px solid var(--border)', borderRadius: '6px', padding: '10px 12px', marginBottom: '8px' };
  const btnBase = 'background:none;border:none;cursor:pointer;padding:2px';

  return html`
    <div class="modal-overlay" onClick=${e => e.target === e.currentTarget && onClose()}>
      <div class="modal" style="max-height:90vh;overflow-y:auto;min-width:540px">
        <div class="modal-title">Custom Pipeline</div>

        <div class="modal-field">
          <label>REPO PATH</label>
          <input type="text" placeholder="e.g. C:/projects/myapp"
            value=${repo} onInput=${e => setRepo(e.target.value)} />
        </div>

        <div class="modal-field">
          <label>DESCRIPTION</label>
          <textarea placeholder="What this pipeline should accomplish…"
            value=${desc} onInput=${e => setDesc(e.target.value)}></textarea>
        </div>

        <label style="font-size:11px;font-weight:600;color:var(--dim);letter-spacing:.4px">STEPS</label>

        ${steps.map((step, si) => html`
          <div key=${step.id} style=${S}>
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
              <span style="font-size:11px;font-weight:600;color:var(--dim)">STEP ${si + 1}</span>
              ${step.agents.length > 1 && html`
                <span style="font-size:10px;color:var(--purple);background:color-mix(in srgb,var(--purple) 12%,transparent);padding:1px 7px;border-radius:10px">
                  parallel ×${step.agents.length}
                </span>
              `}
              <span style="flex:1"></span>
              <button style="${btnBase};color:var(--dim)" onClick=${() => moveStep(step.id, -1)} disabled=${si === 0} title="Move up">
                <span class="mi" style="font-size:14px">arrow_upward</span>
              </button>
              <button style="${btnBase};color:var(--dim)" onClick=${() => moveStep(step.id, 1)} disabled=${si === steps.length - 1} title="Move down">
                <span class="mi" style="font-size:14px">arrow_downward</span>
              </button>
              <button style="${btnBase};color:var(--red,#f44)" onClick=${() => removeStep(step.id)} disabled=${steps.length === 1} title="Remove step">
                <span class="mi" style="font-size:14px">close</span>
              </button>
            </div>

            ${step.agents.map((agent, ai) => html`
              <div key=${agent.id} style="background:var(--hover);border-radius:4px;padding:8px;margin-bottom:6px">
                <div style="display:flex;gap:6px;align-items:center">
                  <select value=${agent.name}
                    onChange=${e => updateAgent(step.id, agent.id, 'name', e.target.value)}
                    style="flex:1;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:12px">
                    ${ALL_AGENTS.map(n => html`<option key=${n} value=${n}>${n}</option>`)}
                  </select>
                  <button style="${btnBase};color:var(--red,#f44)"
                    onClick=${() => removeAgent(step.id, agent.id)} disabled=${step.agents.length === 1} title="Remove agent">
                    <span class="mi" style="font-size:14px">close</span>
                  </button>
                </div>
                <textarea placeholder="Pre-prompt for this agent (optional)…"
                  value=${agent.preprompt}
                  onInput=${e => updateAgent(step.id, agent.id, 'preprompt', e.target.value)}
                  style="margin-top:6px;width:100%;min-height:44px;box-sizing:border-box;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px;font-size:11px;font-family:monospace;resize:vertical">
                </textarea>
              </div>
            `)}

            <button onClick=${() => addAgent(step.id)}
              style="font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;padding:2px 0;margin-top:2px">
              <span class="mi mi-sm">add</span> Add agent to this step
            </button>
          </div>
        `)}

        <button onClick=${addStep}
          style="width:100%;padding:8px;background:none;border:1px dashed var(--border);border-radius:6px;color:var(--dim);cursor:pointer;font-size:12px;margin-bottom:10px">
          <span class="mi mi-sm">add</span> Add step
        </button>

        <div style="border-top:1px solid var(--border);padding-top:10px">
          <div class="modal-field" style="flex-direction:row;align-items:center;gap:10px">
            <label style="margin:0;white-space:nowrap">QUEUE DEV PIPELINE AFTER</label>
            <input type="checkbox" checked=${queueDev} onChange=${e => setQueueDev(e.target.checked)}
              style="width:16px;height:16px;cursor:pointer;accent-color:var(--blue)" />
          </div>
          ${queueDev && html`
            <div class="modal-field" style="margin-top:8px">
              <label>DEV TASK (optional, defaults to description)</label>
              <textarea placeholder="What to build after this pipeline completes…"
                value=${devDesc} onInput=${e => setDevDesc(e.target.value)}></textarea>
            </div>
            <div class="modal-field">
              <label>HANDOFF FILES — blackboard paths passed as context to the dev pipeline (one per line)</label>
              <textarea placeholder="e.g.\nresearch/brief.md\nanalysis.md\nrequirements.md"
                value=${handoffFiles} onInput=${e => setHandoffFiles(e.target.value)}
                style="font-family:monospace;font-size:11px;min-height:64px"></textarea>
            </div>
          `}
        </div>

        ${status && html`<div style="color:var(--red,#f44);font-size:12px;margin-top:4px">${status}</div>`}

        <div class="modal-actions">
          <button class="btn-cancel" onClick=${onClose} disabled=${busy}>Cancel</button>
          <button class="btn-primary" onClick=${submit} disabled=${busy || !canRun}
            style=${planningMode ? 'background:rgba(188,140,255,.8)' : ''}>
            <span class="mi mi-sm">${planningMode ? 'psychology' : 'account_tree'}</span>
            ${busy ? 'Starting…' : planningMode ? 'Plan & Run' : 'Run Pipeline'}
          </button>
        </div>
      </div>
    </div>
  `;
}

// ── PipelineModal (new run + queue) ─────────────────────────────────────────

function PipelineModal({ mode, defaultRepo, sourcePipelineId, planningMode, onClose, onCreated, onNeedPlanning }) {
  const isQueue    = mode === 'queue';
  const isResearch = mode === 'research';
  const isScout    = mode === 'scout';
  const [repo,        setRepo]        = useState(defaultRepo ?? '');
  const [desc,        setDesc]        = useState('');
  const [devDesc,     setDevDesc]     = useState('');
  const [queueDev,    setQueueDev]    = useState(true);
  const [skipped,     setSkipped]     = useState(new Set());
  const [overrides,   setOverrides]   = useState({});
  const [passOutputs, setPassOutputs] = useState(!!sourcePipelineId);
  const [status,      setStatus]      = useState('');
  const [busy,        setBusy]        = useState(false);

  const toggleSkip = (name) => setSkipped(prev => {
    const n = new Set(prev); n.has(name) ? n.delete(name) : n.add(name); return n;
  });

  const needsRepo = !isResearch || queueDev;

  const submit = async () => {
    if ((needsRepo && !repo.trim()) || !desc.trim()) return;
    // Planning mode: hand off to planning modal instead of running immediately
    if (planningMode) {
      const formData = {
        mode: isResearch ? 'research' : isScout ? 'scout' : isQueue ? 'queue' : 'new',
        repo: repo.trim(), desc: desc.trim(),
        devDesc: devDesc.trim(), queueDev,
        skipped: [...skipped], overrides,
        passOutputs, sourcePipelineId,
      };
      onNeedPlanning(formData); return;
    }
    setBusy(true); setStatus('');
    try {
      let endpoint, body;
      if (isResearch) {
        endpoint = '/research/run';
        body = {
          repo_path: repo.trim(), description: desc.trim(),
          queue_dev: queueDev, dev_description: devDesc.trim() || desc.trim(),
        };
      } else if (isScout) {
        endpoint = '/scout/run';
        body = { repo_path: repo.trim(), description: desc.trim(),
                 queue_dev: queueDev, dev_description: devDesc.trim() || desc.trim() };
      } else {
        endpoint = isQueue ? '/pipeline/queue' : '/pipeline/run';
        body = {
          repo_path:   repo.trim(),
          description: desc.trim(),
          skip_agents: [...skipped],
          ...(isQueue && { agent_overrides: overrides }),
          ...(isQueue && passOutputs && sourcePipelineId && { source_pipeline_id: sourcePipelineId }),
        };
      }
      const r = await fetch(`${API}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail ?? 'Server error');
      onCreated(d.pipeline_id, repo.trim(), desc.trim(), isQueue, new Set(skipped), overrides);
    } catch (e) { setStatus(`Error: ${e.message}`); setBusy(false); }
  };

  const onKey = (e) => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submit(); };

  return html`
    <div class="modal-overlay" onClick=${e => e.target === e.currentTarget && onClose()}>
      <div class="modal" style="max-height:90vh;overflow-y:auto">
        <div class="modal-title">${isScout ? 'OSS Scout' : isResearch ? 'Research + Dev' : isQueue ? 'Queue Pipeline' : 'New Pipeline Run'}</div>

        ${needsRepo && html`
          <div class="modal-field">
            <label>REPO PATH</label>
            <input type="text" placeholder="e.g. C:/projects/myapp"
              value=${repo} onInput=${e => setRepo(e.target.value)} />
          </div>
        `}

        <div class="modal-field">
          <label>${isScout ? 'SCOUT TOPIC' : isResearch ? 'RESEARCH TOPIC' : 'TASK DESCRIPTION'}</label>
          <textarea placeholder=${isScout ? 'Interests, language, domain — e.g. "Python web frameworks, good first issue"' : isResearch ? 'What to research — tech stack, libraries, version requirements…' : 'Describe what you want to build or change…'}
            value=${desc} onInput=${e => setDesc(e.target.value)} onKeyDown=${onKey}></textarea>
        </div>

        ${(isResearch || isScout) && html`
          <div class="modal-field" style="flex-direction:row;align-items:center;gap:10px">
            <label style="margin:0;white-space:nowrap">AUTO-QUEUE DEV PIPELINE</label>
            <input type="checkbox" checked=${queueDev}
              onChange=${e => setQueueDev(e.target.checked)}
              style="width:16px;height:16px;cursor:pointer;accent-color:var(--blue)" />
          </div>
          ${queueDev && html`
            <div class="modal-field">
              <label>${isScout ? 'DEV TASK (optional — overrides contribution brief)' : 'DEV TASK (optional, defaults to research topic)'}</label>
              <textarea placeholder=${isScout ? 'Leave blank to use the contribution brief automatically…' : 'What to build after research completes…'}
                value=${devDesc} onInput=${e => setDevDesc(e.target.value)}></textarea>
            </div>
          `}
        `}

        ${(!isResearch && !isScout) && html`
          <div class="modal-field">
            <label>SKIP AGENTS</label>
            <div class="skip-chips">
              ${PIPELINE_AGENTS.map(n => html`
                <button key=${n} class=${`skip-chip${skipped.has(n) ? ' active' : ''}`}
                  onClick=${() => toggleSkip(n)}>${n}</button>
              `)}
            </div>
          </div>
        `}

        ${isQueue && sourcePipelineId && html`
          <div class="modal-field" style="flex-direction:row;align-items:center;gap:10px">
            <label style="margin:0;white-space:nowrap">PASS OUTPUTS FROM PREVIOUS PIPELINE</label>
            <input type="checkbox" checked=${passOutputs}
              onChange=${e => setPassOutputs(e.target.checked)}
              style="width:16px;height:16px;cursor:pointer;accent-color:var(--blue)" />
          </div>
        `}

        ${isQueue && html`
          <div class="modal-field">
            <label>PRE-PROMPTS (optional)</label>
            <div class="modal-preprompts">
              ${PIPELINE_AGENTS.filter(n => !skipped.has(n)).map(n => html`
                <div key=${n} class="modal-preprompt-row">
                  <label>${n}</label>
                  <textarea class="agent-preprompt" style="min-height:36px"
                    placeholder="Extra instruction for ${n}…"
                    value=${overrides[n] ?? ''}
                    onInput=${e => setOverrides(prev => ({...prev, [n]: e.target.value}))}
                  ></textarea>
                </div>
              `)}
            </div>
          </div>
        `}

        <div class="modal-status">${status}</div>

        <div class="modal-actions">
          <button class="btn-cancel" onClick=${onClose} disabled=${busy}>Cancel</button>
          <button class="btn-primary" onClick=${submit} disabled=${busy || (needsRepo && !repo.trim()) || !desc.trim()}
            style=${planningMode ? 'background:rgba(188,140,255,.8)' : ''}>
            <span class="mi mi-sm">${planningMode ? 'psychology' : isQueue ? 'queue' : 'play_arrow'}</span>
            ${busy ? 'Starting…' : planningMode ? 'Plan & Run' : isQueue ? 'Queue Pipeline' : 'Run Pipeline'}
          </button>
        </div>
      </div>
    </div>
  `;
}

// ── PipelineGraph ────────────────────────────────────────────────────────────

function PipelineGraph({ pipelineId, agents, agentOrder, selectedAgent, skippedAgents, onSelect, onSkipToggle,
                          showPrePrompts, agentOverrides, onOverrideChange,
                          isRunning, onAgentControl }) {
  const [steps,       setSteps]       = useState([]);
  const [collapsed,   setCollapsed]   = useState({});

  // Derive which agents belong to the pipeline from the loaded step graph.
  // Falls back to PIPELINE_SET only when steps haven't loaded yet.
  const stepsSet = useMemo(() => {
    if (!steps.length) return PIPELINE_SET;
    const s = new Set(['reconciler']);
    steps.forEach(step => {
      if (step.type === 'single' || step.type === 'parallel') s.add(step.agent);
      else if (step.type === 'fanout') step.entries.forEach(e => s.add(e.agent));
    });
    return s;
  }, [steps]);

  const independents = agentOrder.filter(n => !stepsSet.has(n) && n !== 'consultant');

  useEffect(() => {
    const url = pipelineId ? `${API}/pipeline/${pipelineId}/steps` : `${API}/pipeline/steps`;
    fetch(url).then(r => r.json()).then(setSteps).catch(() => {});
  }, [pipelineId]);

  const toggleCollapse = (key) => setCollapsed(prev => ({...prev, [key]: !prev[key]}));

  const renderNode = (name, showSkip = false) => {
    const ag      = agents[name] ?? {};
    const st      = ag.status ?? 'idle';
    const skipped = skippedAgents?.has(name) ?? false;
    const isActive = st === 'in_progress';
    return html`
      <div key=${name}>
        <div
          class=${`pg-node pg-node--${st}${selectedAgent === name ? ' selected' : ''}${skipped ? ' pg-node--skipped' : ''}`}
          onClick=${() => onSelect(name)}
        >
          <div class="pg-dot"></div>
          <div class="pg-info">
            <div class="pg-name">${name}</div>
            ${ag.currentTool && html`<div class="pg-sub">${ag.currentTool}</div>`}
          </div>
          ${!skipped
            ? html`<div class=${`pg-badge pg-badge--${st}`}>${LABEL[st] ?? st}</div>`
            : html`<div class="pg-badge pg-badge--idle">skip</div>`
          }
          ${showSkip && html`
            <button
              class=${`skip-btn${skipped ? ' skipped' : ''}`}
              title=${skipped ? 'Un-skip' : 'Skip this agent'}
              onClick=${e => { e.stopPropagation(); onSkipToggle(name); }}
            >
              <span class="mi">${skipped ? 'do_not_disturb_on' : 'skip_next'}</span>
            </button>
          `}
          ${isRunning && !showSkip && html`
            <div class="agent-ctrl" onClick=${e => e.stopPropagation()}>
              ${isActive
                ? html`<button class="agent-ctrl-btn agent-ctrl-btn--skip"
                    title="Skip this agent mid-run"
                    onClick=${() => onAgentControl?.(name, 'skip')}>skip</button>`
                : (st === 'done' || st === 'failed') && html`<button class="agent-ctrl-btn agent-ctrl-btn--restart"
                    title="Restart this agent"
                    onClick=${() => onAgentControl?.(name, 'restart')}>restart</button>`
              }
            </div>
          `}
        </div>
        ${showPrePrompts && !skipped && html`
          <span class="preprompt-label">pre-prompt</span>
          <textarea class="agent-preprompt"
            placeholder="Optional extra instruction for ${name}…"
            value=${agentOverrides?.[name] ?? ''}
            onInput=${e => onOverrideChange?.(name, e.target.value)}
            onClick=${e => e.stopPropagation()}
          ></textarea>
        `}
      </div>
    `;
  };

  const renderStep = (step, idx) => {
    if (!step) return null;
    if (step.type === 'single') {
      return html`
        <div key=${idx}>
          ${renderNode(step.agent, true)}
          ${idx < steps.length - 1 && html`
            <div class=${`pg-connector pg-connector--${agents[step.agent]?.status ?? 'idle'}`}>
              <div class="pg-connector-line"></div><div class="pg-connector-arrow"></div>
            </div>`}
        </div>`;
    }
    if (step.type === 'parallel') {
      const key  = `p-${idx}`;
      const open = !collapsed[key];
      const baseStatus = agents[step.agent]?.status ?? 'idle';
      const groupStatus = baseStatus;
      return html`
        <div key=${idx}>
          <div class="pg-step-group">
            <div class="pg-step-group-header" onClick=${() => toggleCollapse(key)}>
              <span class="mi">${open ? 'expand_more' : 'chevron_right'}</span>
              <span class="pg-badge pg-badge--${groupStatus}" style="margin-left:auto">${LABEL[groupStatus] ?? groupStatus}</span>
            </div>
            ${open && html`
              <div class="pg-step-group-body">
                ${Array.from({length: step.count}, (_, i) => html`
                  <div key=${i} class=${`pg-node pg-node--${baseStatus}`}>
                    <div class="pg-dot"></div>
                    <div class="pg-info"><div class="pg-name">${step.agent}</div>
                      ${agents[step.agent]?.currentTool && html`<div class="pg-sub">${agents[step.agent].currentTool}</div>`}
                    </div>
                    <div class=${`pg-badge pg-badge--${baseStatus}`}>${LABEL[baseStatus] ?? baseStatus}</div>
                  </div>`)}
                ${step.reconcile && renderNode('reconciler', false)}
              </div>`}
          </div>
          ${idx < steps.length - 1 && html`
            <div class=${`pg-connector pg-connector--${groupStatus}`}>
              <div class="pg-connector-line"></div><div class="pg-connector-arrow"></div>
            </div>`}
        </div>`;
    }
    if (step.type === 'fanout') {
      const key  = `f-${idx}`;
      const open = !collapsed[key];
      const names = step.entries.map(e => e.agent);
      const groupStatus = names.some(n => agents[n]?.status === 'in_progress') ? 'in_progress'
        : names.some(n => agents[n]?.status === 'done') ? 'done' : 'idle';
      return html`
        <div key=${idx}>
          <div class="pg-step-group">
            <div class="pg-step-group-header" onClick=${() => toggleCollapse(key)}>
              <span class="mi">${open ? 'expand_more' : 'chevron_right'}</span>
              <span class=${`pg-badge pg-badge--${groupStatus}`} style="margin-left:auto">${LABEL[groupStatus] ?? groupStatus}</span>
            </div>
            ${open && html`
              <div class="pg-step-group-body">
                ${names.map(n => renderNode(n, false))}
              </div>`}
          </div>
          ${idx < steps.length - 1 && html`
            <div class=${`pg-connector pg-connector--${groupStatus}`}>
              <div class="pg-connector-line"></div><div class="pg-connector-arrow"></div>
            </div>`}
        </div>`;
    }
    return null;
  };

  // When steps haven't loaded yet, show whatever agents have appeared via SSE.
  // This renders the correct agents for any pipeline type (research, scout, dev, custom).
  const fallbackAgents = agentOrder.filter(n => n !== 'consultant');
  const graphBody = steps.length > 0
    ? steps.map((step, i) => renderStep(step, i))
    : fallbackAgents.map((name, i) => html`
        <div key=${name}>
          ${renderNode(name, true)}
          ${i < fallbackAgents.length - 1 && html`
            <div class=${`pg-connector pg-connector--${agents[name]?.status ?? 'idle'}`}>
              <div class="pg-connector-line"></div><div class="pg-connector-arrow"></div>
            </div>`}
        </div>`);

  return html`
    <div class="pipeline-graph">
      ${graphBody}
      ${independents.length > 0 && html`
        <div class="pg-section-label">Independent</div>
        ${independents.map(name => renderNode(name, false))}
      `}
    </div>
  `;
}

// ── StreamEntry ──────────────────────────────────────────────────────────────

function StreamEntry({ entry }) {
  const { type, agent, data, ts } = entry;
  if (type === 'agent_start')  return html`<div class="entry entry-separator">${fmtTime(ts)} [${agent}] started</div>`;
  if (type === 'agent_done')   return html`<div class="entry entry-done"><span class="mi mi-xs">check_circle</span> ${fmtTime(ts)} [${agent}] done</div>`;
  if (type === 'agent_failed')    return html`<div class="entry entry-failed"><span class="mi mi-xs">error</span> ${fmtTime(ts)} [${agent}] failed</div>`;
  if (type === 'agent_stopped')   return html`<div class="entry" style="color:var(--dim);font-size:11px;padding:2px 0"><span class="mi mi-xs">stop_circle</span> ${fmtTime(ts)} [${agent}] stopped</div>`;
  if (type === 'research_pushed') return html`<div class="entry entry-done"><span class="mi mi-xs">cloud_upload</span> ${fmtTime(ts)} pushed to GitHub — ${data}</div>`;
  if (type === 'tool_call')    return html`
    <div class="entry entry-tool">
      <span class="ts">${fmtTime(ts)}</span>
      <span class="agent-tag">[${agent}]</span>→ ${data}
    </div>`;
  if (type === 'thinking') return html`
    <div class="entry entry-thinking">
      <div class="thinking-header">${fmtTime(ts)} [${agent}]</div>
      <div class="thinking-body">${data}</div>
    </div>`;
  if (type === 'message') return html`
    <div class="entry entry-message">
      <div class="msg-header">${fmtTime(ts)} [${agent}]</div>
      <div class="msg-body">${data}</div>
    </div>`;
  if (type === 'user_interrupt') return html`
    <div class="entry entry-interrupt">
      <span class="ts">${fmtTime(ts)}</span>
      <span class="itag">[you → ${agent}]</span>${data}
    </div>`;
  return null;
}

// ── ComposeBar ───────────────────────────────────────────────────────────────

function ComposeBar({ target, agents, repoPath }) {
  const [text,     setText]     = useState('');
  const [busy,     setBusy]     = useState(false);
  const [feedback, setFeedback] = useState('');

  const canAct       = !!target && !!text.trim() && !busy;
  const isConsultant = target === 'consultant';
  const isLive       = agents[target]?.status === 'in_progress';

  const flash = (label) => { setFeedback(label); setText(''); setTimeout(() => setFeedback(''), 3000); };

  const queue = async () => {
    if (!canAct) return;
    setBusy(true);
    try {
      if (isConsultant) {
        // Consultant uses dedicated endpoint — always fires, no queue-only mode
        await fetch(`${API}/consultant/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text.trim(), project_repo_path: repoPath ?? '' }),
        });
        flash('sent ✓');
      } else {
        const r = await fetch(`${API}/agent/prompt`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agent: target, message: text.trim() }),
        });
        const d = await r.json();
        flash(d.live ? 'sent ✓' : 'queued ✓');
      }
    } finally { setBusy(false); }
  };

  const activate = async () => {
    if (!canAct) return;
    setBusy(true);
    try {
      if (isConsultant) {
        await fetch(`${API}/consultant/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text.trim(), project_repo_path: repoPath ?? '' }),
        });
        flash('started ✓');
      } else {
        if (!repoPath) return;
        const r = await fetch(`${API}/agent/activate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agent: target, repo_path: repoPath, instruction: text.trim() }),
        });
        const d = await r.json();
        flash(d.status === 'started' ? 'started ✓' : 'queued ✓');
      }
    } finally { setBusy(false); }
  };

  const onKey = (e) => { if (e.key === 'Enter') (isConsultant ? activate : queue)(); };

  const targetLabel = target
    ? (isConsultant ? 'consultant' : target)
    : 'select agent';

  return html`
    <div class="compose-bar">
      <div class=${`compose-target${target ? (isConsultant ? ' is-consultant' : ' has-target') : ''}`}>
        <span class="mi mi-sm">${isConsultant ? 'support_agent' : 'arrow_forward'}</span>
        ${targetLabel}
      </div>
      <input
        class="compose-input"
        type="text"
        placeholder=${target ? (isLive ? `Message ${target} now…` : `Ask ${target}…`) : 'Select an agent from the sidebar'}
        value=${text}
        onInput=${e => setText(e.target.value)}
        onKeyDown=${onKey}
        disabled=${!target}
      />
      ${!isConsultant && html`
        <button class="compose-send" onClick=${queue} disabled=${!canAct} title="Queue message (Enter)">
          <span class="mi">inbox</span>
          ${busy ? '…' : feedback || 'Queue'}
        </button>
      `}
      <button class="compose-run" onClick=${activate} disabled=${!canAct || (!isConsultant && !repoPath)}
        title=${isConsultant ? 'Ask consultant' : 'Activate agent now'}>
        <span class="mi">play_arrow</span>
        ${busy ? '…' : feedback || (isConsultant ? 'Ask' : 'Run')}
      </button>
    </div>
  `;
}

// ── OutputDrawer ─────────────────────────────────────────────────────────────

function OutputDrawer({ repoPath, selectedAgent, files, onClose }) {
  const [selectedFile, setSelectedFile] = useState('');
  const [content, setContent]           = useState('');
  const [loading, setLoading]           = useState(false);

  useEffect(() => {
    if (!files.length) { setSelectedFile(''); setContent(''); return; }
    const match = files.find(f => f.includes(selectedAgent)) ?? files[0];
    setSelectedFile(match);
  }, [selectedAgent, files]);

  useEffect(() => {
    if (!selectedFile || !repoPath) return;
    setLoading(true);
    fetch(`${API}/blackboard?repo_path=${encodeURIComponent(repoPath)}&filename=${encodeURIComponent(selectedFile)}`)
      .then(r => r.json())
      .then(d => { setContent(d.content ?? ''); setLoading(false); })
      .catch(() => { setContent('(error loading file)'); setLoading(false); });
  }, [selectedFile, repoPath]);

  return html`
    <div class="drawer">
      <div class="drawer-header">
        <div class="drawer-title">${selectedAgent}</div>
        <select class="file-select" value=${selectedFile} onChange=${e => setSelectedFile(e.target.value)}>
          ${files.map(f => html`<option key=${f} value=${f}>${f}</option>`)}
        </select>
        <button class="drawer-close" onClick=${onClose}>
          <span class="mi">close</span>
        </button>
      </div>
      <div class="drawer-body">
        ${loading
          ? html`<span class="drawer-placeholder">Loading…</span>`
          : content || html`<span class="drawer-placeholder">No content.</span>`
        }
      </div>
    </div>
  `;
}
