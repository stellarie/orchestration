<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orchestration</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --text:      #e6edf3;
      --dim:       #8b949e;
      --green:     #3fb950;
      --blue:      #388bfd;
      --yellow:    #d29922;
      --red:       #f85149;
      --purple:    #bc8cff;
      --orange:    #ffa657;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; overflow: hidden; }

    /* ── layout ── */
    .root { display: grid; grid-template-rows: 48px 1fr; height: 100vh; }

    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-title { font-weight: 600; font-size: 15px; letter-spacing: -.2px; color: var(--text); white-space: nowrap; }
    .header-title span { color: var(--blue); }
    .header-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .repo-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 5px 10px; border-radius: 6px;
      font-size: 12px; font-family: 'Consolas', monospace;
      outline: none; min-width: 0;
    }
    .repo-input:focus { border-color: var(--blue); }
    .repo-input::placeholder { color: var(--dim); }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0; transition: background .3s;
    }
    .dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.off { background: var(--dim); }

    .body { display: grid; grid-template-columns: 260px 1fr; overflow: hidden; }

    /* ── agent list ── */
    .agent-panel {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-heading {
      padding: 10px 14px 8px;
      font-size: 11px; font-weight: 600; letter-spacing: .8px;
      color: var(--dim); text-transform: uppercase;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .agent-list { overflow-y: auto; flex: 1; padding: 6px 0; }
    .agent-list::-webkit-scrollbar { width: 4px; }
    .agent-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .agent-card {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .15s, border-color .15s;
    }
    .agent-card:hover { background: var(--surface2); }
    .agent-card.selected { background: var(--surface2); border-left-color: var(--blue); }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .status-dot.idle        { background: var(--border); }
    .status-dot.queued      { background: var(--dim); }
    .status-dot.in_progress { background: var(--blue); animation: pulse 1.2s ease-in-out infinite; }
    .status-dot.done        { background: var(--green); }
    .status-dot.failed      { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .agent-info { flex: 1; min-width: 0; }
    .agent-name { font-size: 13px; font-weight: 500; }
    .agent-sub  { font-size: 11px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    .status-badge {
      font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 10px;
      flex-shrink: 0; text-transform: uppercase; letter-spacing: .4px;
    }
    .badge-idle        { background: var(--surface2); color: var(--dim); }
    .badge-queued      { background: var(--surface2); color: var(--dim); }
    .badge-in_progress { background: rgba(56,139,253,.15); color: var(--blue); }
    .badge-done        { background: rgba(63,185,80,.15);  color: var(--green); }
    .badge-failed      { background: rgba(248,81,73,.15);  color: var(--red); }

    .empty-agents {
      padding: 32px 14px; text-align: center; color: var(--dim); font-size: 12px; line-height: 1.6;
    }

    /* ── pipeline graph ── */
    .pipeline-graph { overflow-y: auto; flex: 1; padding: 8px 10px 12px; }
    .pipeline-graph::-webkit-scrollbar { width: 4px; }
    .pipeline-graph::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .pg-section-label {
      font-size: 10px; font-weight: 600; letter-spacing: .6px; color: var(--dim);
      text-transform: uppercase; padding: 10px 4px 6px;
    }

    .pg-node {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface2);
      cursor: pointer; transition: border-color .2s, background .15s;
    }
    .pg-node:hover { background: #252c38; }
    .pg-node.selected { box-shadow: 0 0 0 2px var(--blue); }
    .pg-node--in_progress { border-color: var(--blue); background: rgba(56,139,253,.07); }
    .pg-node--done        { border-color: rgba(63,185,80,.5); background: rgba(63,185,80,.05); }
    .pg-node--failed      { border-color: var(--red); background: rgba(248,81,73,.06); }

    .pg-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--border);
    }
    .pg-node--in_progress .pg-dot {
      background: var(--blue); box-shadow: 0 0 5px var(--blue);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .pg-node--done   .pg-dot { background: var(--green); }
    .pg-node--failed .pg-dot { background: var(--red); }

    .pg-info { flex: 1; min-width: 0; }
    .pg-name { font-size: 12.5px; font-weight: 500; color: var(--text); }
    .pg-sub  { font-size: 10px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    .pg-badge {
      font-size: 9.5px; font-weight: 600; padding: 2px 5px; border-radius: 8px;
      flex-shrink: 0; text-transform: uppercase; letter-spacing: .3px;
    }
    .pg-badge--idle        { background: transparent; color: var(--dim); }
    .pg-badge--in_progress { background: rgba(56,139,253,.15); color: var(--blue); }
    .pg-badge--done        { background: rgba(63,185,80,.15);  color: var(--green); }
    .pg-badge--failed      { background: rgba(248,81,73,.15);  color: var(--red); }

    .pg-connector {
      display: flex; flex-direction: column; align-items: center;
      height: 18px; flex-shrink: 0;
    }
    .pg-connector-line  { width: 1px; flex: 1; background: var(--border); }
    .pg-connector-arrow {
      width: 0; height: 0;
      border-left: 3px solid transparent;
      border-right: 3px solid transparent;
      border-top: 4px solid var(--border);
    }
    .pg-connector--done .pg-connector-line  { background: rgba(63,185,80,.5); }
    .pg-connector--done .pg-connector-arrow { border-top-color: rgba(63,185,80,.5); }
    .pg-connector--in_progress .pg-connector-line  { background: var(--blue); }
    .pg-connector--in_progress .pg-connector-arrow { border-top-color: var(--blue); }

    .new-btn {
      margin: 8px 10px 2px; padding: 6px 10px;
      background: rgba(56,139,253,.12); border: 1px solid rgba(56,139,253,.3);
      color: var(--blue); border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; width: calc(100% - 20px); text-align: center;
      transition: background .15s, border-color .15s;
    }
    .new-btn:hover { background: rgba(56,139,253,.22); border-color: var(--blue); }

    /* ── modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; width: 480px; max-width: calc(100vw - 32px);
      padding: 22px 24px; display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .modal-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .modal label { font-size: 12px; font-weight: 600; color: var(--dim); letter-spacing: .4px; }
    .modal-field { display: flex; flex-direction: column; gap: 6px; }
    .modal input, .modal textarea {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 7px 10px; border-radius: 6px; font-size: 13px;
      font-family: 'Consolas', monospace; outline: none; width: 100%;
    }
    .modal input:focus, .modal textarea:focus { border-color: var(--blue); }
    .modal textarea { min-height: 110px; resize: vertical; font-family: 'Segoe UI', sans-serif; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .btn-cancel {
      padding: 6px 16px; background: var(--surface2); border: 1px solid var(--border);
      color: var(--dim); border-radius: 6px; font-size: 13px; cursor: pointer;
    }
    .btn-cancel:hover { color: var(--text); }
    .btn-run {
      padding: 6px 18px; background: var(--blue); border: none;
      color: #fff; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-run:hover { background: #4f9cff; }
    .btn-run:disabled { opacity: .45; cursor: default; }
    .modal-status { font-size: 12px; color: var(--green); min-height: 18px; }

    /* ── right panel ── */
    .right-panel { display: flex; flex-direction: column; overflow: hidden; }

    /* ── thinking stream ── */
    .stream-panel {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      font-family: 'Consolas', 'Monaco', monospace; font-size: 12.5px; line-height: 1.6;
      min-height: 0;
    }
    .stream-panel::-webkit-scrollbar { width: 4px; }
    .stream-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .stream-empty {
      height: 100%; display: flex; align-items: center; justify-content: center;
      color: var(--dim); font-family: 'Segoe UI', sans-serif; font-size: 13px;
    }

    .entry { margin-bottom: 6px; }

    .entry-separator {
      color: var(--dim); font-size: 11px; padding: 6px 0 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .entry-separator::before, .entry-separator::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .entry-thinking .thinking-header {
      color: var(--dim); font-size: 11px; margin-bottom: 3px;
    }
    .entry-thinking .thinking-body {
      color: var(--text); white-space: pre-wrap; word-break: break-word;
    }

    .entry-tool {
      color: var(--purple); padding: 1px 0;
    }
    .entry-tool .ts { color: var(--dim); font-size: 11px; margin-right: 6px; }
    .entry-tool .agent-tag { color: var(--dim); margin-right: 4px; }

    .entry-done   { color: var(--green); font-size: 11px; padding: 2px 0; }
    .entry-failed { color: var(--red);   font-size: 11px; padding: 2px 0; }

    /* ── output drawer ── */
    .drawer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; flex-direction: column;
      height: 280px; flex-shrink: 0;
    }
    .drawer-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .drawer-title { font-size: 12px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: .6px; flex: 1; }
    .file-select {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 3px 8px; border-radius: 5px; font-size: 12px;
      font-family: 'Consolas', monospace; outline: none; flex: 1; max-width: 320px;
    }
    .file-select:focus { border-color: var(--blue); }
    .drawer-close {
      background: none; border: none; color: var(--dim); cursor: pointer;
      font-size: 16px; padding: 2px 6px; border-radius: 4px; line-height: 1;
    }
    .drawer-close:hover { background: var(--surface2); color: var(--text); }
    .drawer-body {
      flex: 1; overflow-y: auto; padding: 10px 14px;
      font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word; color: var(--text);
    }
    .drawer-body::-webkit-scrollbar { width: 4px; }
    .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .drawer-placeholder { color: var(--dim); font-family: 'Segoe UI', sans-serif; }

    /* ── compose bar ── */
    .compose-bar {
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; flex-shrink: 0;
    }
    .compose-label { font-size: 11px; font-weight: 600; color: var(--dim); letter-spacing: .4px; white-space: nowrap; }
    .compose-select {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 4px 8px; border-radius: 5px; font-size: 12px;
      font-family: 'Consolas', monospace; outline: none; max-width: 130px;
    }
    .compose-select:focus { border-color: var(--blue); }
    .compose-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 4px 10px; border-radius: 5px;
      font-size: 13px; outline: none; min-width: 0;
    }
    .compose-input:focus { border-color: var(--blue); }
    .compose-input::placeholder { color: var(--dim); }
    .compose-send {
      background: var(--blue); border: none; color: #fff;
      padding: 4px 14px; border-radius: 5px; font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .compose-send:hover { background: #4f9cff; }
    .compose-send:disabled { opacity: .35; cursor: default; }
    .compose-run {
      background: rgba(63,185,80,.12); border: 1px solid rgba(63,185,80,.3);
      color: var(--green); padding: 4px 12px; border-radius: 5px;
      font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .compose-run:hover { background: rgba(63,185,80,.22); border-color: var(--green); }
    .compose-run:disabled { opacity: .35; cursor: default; }

    .entry-interrupt {
      color: var(--orange); padding: 1px 0; font-style: italic;
    }
    .entry-interrupt .ts { color: var(--dim); font-size: 11px; margin-right: 6px; }
    .entry-interrupt .itag { color: var(--yellow); margin-right: 4px; font-style: normal; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { h, render }                              from 'https://esm.sh/preact@10.23.2';
import { useState, useEffect, useRef, useCallback } from 'https://esm.sh/preact@10.23.2/hooks';
import htm                                         from 'https://esm.sh/htm@3.1.1';

const html = htm.bind(h);
const MAX_STREAM = 600;
const API = '';  // same origin

// ── helpers ────────────────────────────────────────────────────────────────

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toTimeString().slice(0, 8);
}

function badgeClass(status) { return `status-badge badge-${status ?? 'idle'}`; }
function dotClass(status)   { return `status-dot ${status ?? 'idle'}`; }

const LABEL = { idle: 'idle', queued: 'queued', in_progress: 'running', done: 'done', failed: 'failed' };

// ── NewProjectModal ─────────────────────────────────────────────────────────

function NewProjectModal({ defaultRepo, onClose, onStarted }) {
  const [repo,   setRepo]   = useState(defaultRepo ?? '');
  const [desc,   setDesc]   = useState('');
  const [status, setStatus] = useState('');
  const [busy,   setBusy]   = useState(false);

  const submit = async () => {
    if (!repo.trim() || !desc.trim()) return;
    setBusy(true);
    setStatus('');
    try {
      const r = await fetch(`${API}/pipeline/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ repo_path: repo.trim(), description: desc.trim() }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail ?? 'Server error');
      setStatus(`Started — run ${d.task_id}`);
      onStarted(repo.trim());
      setTimeout(onClose, 1200);
    } catch (e) {
      setStatus(`Error: ${e.message}`);
      setBusy(false);
    }
  };

  const onKey = (e) => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submit(); };

  return html`
    <div class="modal-overlay" onClick=${e => e.target === e.currentTarget && onClose()}>
      <div class="modal">
        <div class="modal-title">New Pipeline Run</div>

        <div class="modal-field">
          <label>REPO PATH</label>
          <input
            type="text"
            placeholder="e.g. C:/projects/myapp"
            value=${repo}
            onInput=${e => setRepo(e.target.value)}
          />
        </div>

        <div class="modal-field">
          <label>TASK DESCRIPTION</label>
          <textarea
            placeholder="Describe what you want to build or change…"
            value=${desc}
            onInput=${e => setDesc(e.target.value)}
            onKeyDown=${onKey}
          ></textarea>
        </div>

        <div class="modal-status">${status}</div>

        <div class="modal-actions">
          <button class="btn-cancel" onClick=${onClose} disabled=${busy}>Cancel</button>
          <button class="btn-run"    onClick=${submit}  disabled=${busy || !repo.trim() || !desc.trim()}>
            ${busy ? 'Starting…' : 'Run Pipeline'}
          </button>
        </div>
      </div>
    </div>
  `;
}

const PIPELINE_AGENTS = [
  "architect", "designer", "planner", "scaffolder",
  "tester", "reviewer", "test-generator", "coder",
  "qa-tester", "code-reviewer", "commit", "documentation",
];
const PIPELINE_SET = new Set(PIPELINE_AGENTS);

// ── PipelineGraph ────────────────────────────────────────────────────────────

function PipelineGraph({ agents, agentOrder, selectedAgent, onSelect }) {
  const independents = agentOrder.filter(n => !PIPELINE_SET.has(n));

  const renderNode = (name) => {
    const ag = agents[name] ?? {};
    const st = ag.status ?? 'idle';
    return html`
      <div
        class=${`pg-node pg-node--${st}${selectedAgent === name ? ' selected' : ''}`}
        onClick=${() => onSelect(name)}
      >
        <div class="pg-dot"></div>
        <div class="pg-info">
          <div class="pg-name">${name}</div>
          ${ag.currentTool && html`<div class="pg-sub">→ ${ag.currentTool}</div>`}
        </div>
        <div class=${`pg-badge pg-badge--${st}`}>${LABEL[st] ?? st}</div>
      </div>
    `;
  };

  return html`
    <div class="pipeline-graph">
      ${PIPELINE_AGENTS.map((name, i) => html`
        ${renderNode(name)}
        ${i < PIPELINE_AGENTS.length - 1 && html`
          <div class=${`pg-connector pg-connector--${agents[name]?.status ?? 'idle'}`}>
            <div class="pg-connector-line"></div>
            <div class="pg-connector-arrow"></div>
          </div>
        `}
      `)}

      ${independents.length > 0 && html`
        <div class="pg-section-label">Independent</div>
        ${independents.map(name => renderNode(name))}
      `}
    </div>
  `;
}

// ── AgentCard ───────────────────────────────────────────────────────────────

function AgentCard({ name, status, currentTool, selected, onClick }) {
  return html`
    <div class=${`agent-card${selected ? ' selected' : ''}`} onClick=${onClick}>
      <div class=${dotClass(status)}></div>
      <div class="agent-info">
        <div class="agent-name">${name}</div>
        ${currentTool && html`<div class="agent-sub">→ ${currentTool}</div>`}
      </div>
      <div class=${badgeClass(status)}>${LABEL[status] ?? status}</div>
    </div>
  `;
}

// ── StreamEntry ─────────────────────────────────────────────────────────────

function StreamEntry({ entry }) {
  const { type, agent, data, ts } = entry;

  if (type === 'agent_start') return html`
    <div class="entry entry-separator">${fmtTime(ts)} [${agent}] started</div>
  `;

  if (type === 'agent_done') return html`
    <div class="entry entry-done">✓ ${fmtTime(ts)} [${agent}] done</div>
  `;

  if (type === 'agent_failed') return html`
    <div class="entry entry-failed">✗ ${fmtTime(ts)} [${agent}] failed</div>
  `;

  if (type === 'tool_call') return html`
    <div class="entry entry-tool">
      <span class="ts">${fmtTime(ts)}</span>
      <span class="agent-tag">[${agent}]</span>→ ${data}
    </div>
  `;

  if (type === 'thinking') return html`
    <div class="entry entry-thinking">
      <div class="thinking-header">${fmtTime(ts)} [${agent}]</div>
      <div class="thinking-body">${data}</div>
    </div>
  `;

  if (type === 'user_interrupt') return html`
    <div class="entry entry-interrupt">
      <span class="ts">${fmtTime(ts)}</span>
      <span class="itag">[you → ${agent}]</span>${data}
    </div>
  `;

  return null;
}

// ── ComposeBar ───────────────────────────────────────────────────────────────

function ComposeBar({ agents, agentOrder, repoPath }) {
  const [target,   setTarget]   = useState('');
  const [text,     setText]     = useState('');
  const [busy,     setBusy]     = useState(false);
  const [feedback, setFeedback] = useState('');  // '' | 'sent' | 'queued' | 'started'

  // Auto-select first agent when list populates
  useEffect(() => {
    if (agentOrder.length && !target) setTarget(agentOrder[0]);
  }, [agentOrder.length]);

  const canAct = !!target && !!text.trim() && !busy;

  const flash = (label) => {
    setFeedback(label);
    setText('');
    setTimeout(() => setFeedback(''), 3000);
  };

  // Queue message into agent inbox (existing behaviour)
  const queue = async () => {
    if (!canAct) return;
    setBusy(true);
    try {
      const r = await fetch(`${API}/agent/prompt`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agent: target, message: text.trim() }),
      });
      const d = await r.json();
      flash(d.live ? 'sent ✓' : 'queued ✓');
    } finally { setBusy(false); }
  };

  // Activate agent immediately with this as the instruction
  const activate = async () => {
    if (!canAct || !repoPath) return;
    setBusy(true);
    try {
      const r = await fetch(`${API}/agent/activate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agent: target, repo_path: repoPath, instruction: text.trim() }),
      });
      const d = await r.json();
      flash(d.status === 'started' ? 'started ✓' : 'queued ✓');
    } finally { setBusy(false); }
  };

  const onKey = (e) => { if (e.key === 'Enter') queue(); };

  const isLive = agents[target]?.status === 'in_progress';

  return html`
    <div class="compose-bar">
      <span class="compose-label">PROMPT</span>
      <select
        class="compose-select"
        value=${target}
        onChange=${e => setTarget(e.target.value)}
        disabled=${!agentOrder.length}
      >
        ${!agentOrder.length && html`<option value="">— no agents —</option>`}
        ${agentOrder.map(n => {
          const s = agents[n]?.status;
          const label = s === 'in_progress' ? `${n} ●` : n;
          return html`<option key=${n} value=${n}>${label}</option>`;
        })}
      </select>
      <input
        class="compose-input"
        type="text"
        placeholder=${target ? (isLive ? `Message ${target} now…` : `Queue for ${target}…`) : 'Select an agent'}
        value=${text}
        onInput=${e => setText(e.target.value)}
        onKeyDown=${onKey}
        disabled=${!agentOrder.length}
      />
      <button class="compose-send" onClick=${queue} disabled=${!canAct} title="Queue message (Enter)">
        ${busy ? '…' : feedback || 'Queue'}
      </button>
      <button class="compose-run" onClick=${activate} disabled=${!canAct || !repoPath} title="Activate agent now">
        ▶ Run
      </button>
    </div>
  `;
}

// ── OutputDrawer ────────────────────────────────────────────────────────────

function OutputDrawer({ repoPath, selectedAgent, files, onClose }) {
  const [selectedFile, setSelectedFile] = useState('');
  const [content, setContent]           = useState('');
  const [loading, setLoading]           = useState(false);

  // Auto-select first file that loosely matches the agent name
  useEffect(() => {
    if (!files.length) { setSelectedFile(''); setContent(''); return; }
    const match = files.find(f => f.includes(selectedAgent)) ?? files[0];
    setSelectedFile(match);
  }, [selectedAgent, files]);

  useEffect(() => {
    if (!selectedFile || !repoPath) return;
    setLoading(true);
    fetch(`${API}/blackboard?repo_path=${encodeURIComponent(repoPath)}&filename=${encodeURIComponent(selectedFile)}`)
      .then(r => r.json())
      .then(d => { setContent(d.content ?? ''); setLoading(false); })
      .catch(() => { setContent('(error loading file)'); setLoading(false); });
  }, [selectedFile, repoPath]);

  return html`
    <div class="drawer">
      <div class="drawer-header">
        <div class="drawer-title">${selectedAgent}</div>
        <select
          class="file-select"
          value=${selectedFile}
          onChange=${e => setSelectedFile(e.target.value)}
        >
          ${files.map(f => html`<option key=${f} value=${f}>${f}</option>`)}
        </select>
        <button class="drawer-close" onClick=${onClose}>×</button>
      </div>
      <div class="drawer-body">
        ${loading
          ? html`<span class="drawer-placeholder">Loading…</span>`
          : content
            ? content
            : html`<span class="drawer-placeholder">No content.</span>`
        }
      </div>
    </div>
  `;
}

// ── App ─────────────────────────────────────────────────────────────────────

function App() {
  const [repoPath, setRepoPath]         = useState(() => localStorage.getItem('repoPath') ?? '');
  const [connected, setConnected]       = useState(false);
  const [agents, setAgents]             = useState({});      // name → {status, currentTool}
  const [agentOrder, setAgentOrder]     = useState([]);      // insertion order
  const [stream, setStream]             = useState([]);      // log entries
  const [selectedAgent, setSelectedAgent] = useState(null);
  const [outputFiles, setOutputFiles]   = useState([]);
  const [showNewProject, setShowNewProject] = useState(false);

  const streamRef  = useRef(null);
  const esRef      = useRef(null);
  const entryId    = useRef(0);

  // Persist repo path
  useEffect(() => { localStorage.setItem('repoPath', repoPath); }, [repoPath]);

  // Auto-scroll stream
  useEffect(() => {
    if (streamRef.current) {
      const el = streamRef.current;
      const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
      if (atBottom) el.scrollTop = el.scrollHeight;
    }
  }, [stream]);

  // SSE connection
  const connect = useCallback((path) => {
    if (esRef.current) { esRef.current.close(); esRef.current = null; }
    if (!path) { setConnected(false); return; }

    const es = new EventSource(`${API}/stream?repo_path=${encodeURIComponent(path)}`);
    esRef.current = es;

    es.onopen    = () => setConnected(true);
    es.onerror   = () => setConnected(false);
    es.onmessage = (e) => {
      let event;
      try { event = JSON.parse(e.data); } catch { return; }
      const { type, agent } = event;

      // Update agent state
      if (type === 'agent_start') {
        setAgents(prev => ({ ...prev, [agent]: { status: 'in_progress', currentTool: null } }));
        setAgentOrder(prev => prev.includes(agent) ? prev : [...prev, agent]);
      } else if (type === 'tool_call') {
        setAgents(prev => prev[agent]
          ? { ...prev, [agent]: { ...prev[agent], currentTool: event.data } }
          : prev
        );
      } else if (type === 'agent_done') {
        setAgents(prev => prev[agent]
          ? { ...prev, [agent]: { ...prev[agent], status: 'done', currentTool: null } }
          : prev
        );
      } else if (type === 'agent_failed') {
        setAgents(prev => prev[agent]
          ? { ...prev, [agent]: { ...prev[agent], status: 'failed', currentTool: null } }
          : prev
        );
      }

      // Append to stream (cap at MAX_STREAM)
      if (['agent_start','thinking','tool_call','agent_done','agent_failed'].includes(type)) {
        setStream(prev => {
          const next = [...prev, { ...event, _id: ++entryId.current }];
          return next.length > MAX_STREAM ? next.slice(next.length - MAX_STREAM) : next;
        });
      }
    };

    return () => es.close();
  }, []);

  useEffect(() => {
    const cleanup = connect(repoPath);
    return cleanup;
  }, [repoPath]);

  // Fetch initial status when repo path changes
  useEffect(() => {
    if (!repoPath) { setAgents({}); setAgentOrder([]); return; }
    fetch(`${API}/status?repo_path=${encodeURIComponent(repoPath)}`)
      .then(r => r.json())
      .then(data => {
        if (!data?.steps) return;
        const next = {};
        const order = [];
        for (const [name, info] of Object.entries(data.steps)) {
          next[name] = { status: info.status ?? 'idle', currentTool: null };
          order.push(name);
        }
        setAgents(next);
        setAgentOrder(order);
      })
      .catch(() => {});
  }, [repoPath]);

  // Fetch blackboard file list when agent is selected
  useEffect(() => {
    if (!selectedAgent || !repoPath) { setOutputFiles([]); return; }
    fetch(`${API}/blackboard/list?repo_path=${encodeURIComponent(repoPath)}`)
      .then(r => r.json())
      .then(d => setOutputFiles(d.files ?? []))
      .catch(() => setOutputFiles([]));
  }, [selectedAgent, repoPath]);

  const handleAgentClick = (name) => {
    setSelectedAgent(prev => prev === name ? null : name);
  };

  const noRepo   = !repoPath;
  const noAgents = agentOrder.length === 0;

  const handlePipelineStarted = (newRepo) => {
    setRepoPath(newRepo);
    setAgents({});
    setAgentOrder([]);
    setStream([]);
  };

  return html`
    <div class="root">
      ${showNewProject && html`
        <${NewProjectModal}
          defaultRepo=${repoPath}
          onClose=${() => setShowNewProject(false)}
          onStarted=${handlePipelineStarted}
        />
      `}

      <!-- Header -->
      <div class="header">
        <div class="header-title">⬡ <span>Orchestration</span></div>
        <div class="header-sep"></div>
        <input
          class="repo-input"
          type="text"
          placeholder="repo path, e.g. C:/projects/myapp"
          value=${repoPath}
          onInput=${e => setRepoPath(e.target.value)}
        />
        <div class=${`dot ${connected ? 'on' : 'off'}`} title=${connected ? 'Connected' : 'Disconnected'}></div>
      </div>

      <!-- Body -->
      <div class="body">

        <!-- Pipeline graph -->
        <div class="agent-panel">
          <div class="panel-heading">Pipeline</div>
          <button class="new-btn" onClick=${() => setShowNewProject(true)}>+ New Pipeline Run</button>
          <${PipelineGraph}
            agents=${agents}
            agentOrder=${agentOrder}
            selectedAgent=${selectedAgent}
            onSelect=${handleAgentClick}
          />
        </div>

        <!-- Right: stream + drawer -->
        <div class="right-panel">
          <div class="stream-panel" ref=${streamRef}>
            ${stream.length === 0
              ? html`<div class="stream-empty">${noRepo ? 'Enter a repo path above to connect.' : 'Waiting for agent activity…'}</div>`
              : stream.map(entry => html`<${StreamEntry} key=${entry._id} entry=${entry} />`)
            }
          </div>

          <${ComposeBar} agents=${agents} agentOrder=${agentOrder} repoPath=${repoPath} />

          ${selectedAgent && html`
            <${OutputDrawer}
              repoPath=${repoPath}
              selectedAgent=${selectedAgent}
              files=${outputFiles}
              onClose=${() => setSelectedAgent(null)}
            />
          `}
        </div>

      </div>
    </div>
  `;
}

render(html`<${App} />`, document.getElementById('root'));
</script>
</body>
</html>
