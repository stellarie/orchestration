// ── PipelineTab ───────────────────────────────────────────────────────────────

function PipelineTab({ pipeline, consultantAgentState, consultantEvents,
                        onSkipToggle, onOverrideChange, onQueueNext, onResume,
                        onControl, onAgentControl }) {
  const [selectedAgent, setSelectedAgent] = useState(null);
  const [filterAgent,   setFilterAgent]   = useState('');
  const [autoScroll,    setAutoScroll]    = useState(true);
  const [outputFiles,   setOutputFiles]   = useState([]);
  const streamRef    = useRef(null);
  const autoScrollRef= useRef(true);

  useEffect(() => { autoScrollRef.current = autoScroll; }, [autoScroll]);

  const allStream = useMemo(() => {
    const merged = [...(pipeline?.stream ?? []), ...consultantEvents];
    return merged.sort((a, b) => (a.ts < b.ts ? -1 : 1));
  }, [pipeline?.stream, consultantEvents]);

  useEffect(() => {
    if (autoScrollRef.current && streamRef.current)
      streamRef.current.scrollTo({ top: streamRef.current.scrollHeight, behavior: 'smooth' });
  }, [allStream]);

  const handleStreamScroll = () => {
    const el = streamRef.current; if (!el) return;
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
    if ( atBottom && !autoScrollRef.current) { autoScrollRef.current = true;  setAutoScroll(true);  }
    if (!atBottom &&  autoScrollRef.current) { autoScrollRef.current = false; setAutoScroll(false); }
  };

  useEffect(() => {
    if (!selectedAgent || selectedAgent === 'consultant' || !pipeline?.repo_path || pipeline.status === 'queued') {
      setOutputFiles([]); return;
    }
    fetch(`${API}/blackboard/list?repo_path=${encodeURIComponent(pipeline.repo_path)}`)
      .then(r => r.json()).then(d => setOutputFiles(d.files ?? [])).catch(() => setOutputFiles([]));
  }, [selectedAgent, pipeline?.repo_path]);

  if (!pipeline) return html`<div class="body"><div class="stream-empty">Pipeline not found.</div></div>`;

  const { id, repo_path, status, agents, agentOrder, skip_agents, agent_overrides, task } = pipeline;
  const isQueued   = status === 'queued';
  const isRunning  = status === 'running';

  const pplStatuses  = PIPELINE_AGENTS.map(n => agents[n]?.status ?? 'idle');
  const isResumable  = !isQueued
    && repo_path
    && pplStatuses.some(s => s === 'done' || s === 'failed')
    && pplStatuses.every(s => s !== 'in_progress')
    && !pplStatuses.every(s => s === 'done');

  const allAgents = [...new Set([...agentOrder, 'consultant'])];
  const visible   = filterAgent ? allStream.filter(e => e.agent === filterAgent) : allStream;

  return html`
    <div class="body">
      <div class="sidebar">
        <!-- Pipeline header -->
        <div class="pipeline-tab-header">
          <code class="tab-id">#${id}</code>
          <span class=${`status-pill status-pill--${status}`}>${status}</span>
          <span class="repo-label" title=${repo_path}>${pipeline.label}</span>
          ${isRunning && html`
            <div class="pipeline-controls">
              <button class="ctrl-btn ctrl-btn--pause" title="Pause after current step"
                onClick=${() => onControl?.(id, 'pause')}>
                <span class="mi">pause</span>
              </button>
              <button class="ctrl-btn ctrl-btn--stop" title="Stop pipeline immediately"
                onClick=${() => onControl?.(id, 'stop')}>
                <span class="mi">stop</span>
              </button>
            </div>
          `}
          ${status === 'paused' && html`
            <div class="pipeline-controls">
              <button class="ctrl-btn ctrl-btn--resume" title="Resume pipeline"
                onClick=${() => onControl?.(id, 'resume')}>
                <span class="mi">play_arrow</span>
              </button>
              <button class="ctrl-btn ctrl-btn--stop" title="Stop pipeline"
                onClick=${() => onControl?.(id, 'stop')}>
                <span class="mi">stop</span>
              </button>
            </div>
          `}
        </div>

        <div class="sidebar-section-heading">
          <span class="mi mi-sm">schema</span> Pipeline
        </div>

        <!-- Actions -->
        <div class="pipeline-actions">
          ${isRunning && html`
            <button class="action-btn action-btn--queue" onClick=${() => onQueueNext(repo_path, id)}>
              <span class="mi">queue</span> Queue Next
            </button>
          `}
          ${isResumable && html`
            <button class="action-btn action-btn--resume" onClick=${() => onResume(pipeline)}>
              <span class="mi">replay</span> Resume
            </button>
          `}
        </div>
        ${isQueued && html`
          <div class="queued-hint">
            <span class="mi mi-xs">schedule</span> Waiting for current pipeline to finish
          </div>
        `}

        <${PipelineGraph}
          pipelineId=${id}
          agents=${agents}
          agentOrder=${agentOrder}
          selectedAgent=${selectedAgent}
          skippedAgents=${skip_agents}
          onSelect=${n => setSelectedAgent(prev => prev === n ? null : n)}
          onSkipToggle=${n => onSkipToggle(id, n)}
          showPrePrompts=${isQueued}
          agentOverrides=${agent_overrides}
          onOverrideChange=${(n, t) => onOverrideChange(id, n, t)}
          isRunning=${isRunning}
          onAgentControl=${(agent, action) => onAgentControl?.(id, agent, action)}
        />

        <${ConsultantSection}
          agentState=${consultantAgentState}
          selected=${selectedAgent === 'consultant'}
          onSelect=${n => setSelectedAgent(prev => prev === n ? null : n)}
        />
      </div>

      <div class="right-panel">
        <div class="stream-header">
          <span class="stream-header-title">Activity</span>
          <span class="mi mi-sm" style="color:var(--dim)">filter_list</span>
          <select class="agent-filter" value=${filterAgent} onChange=${e => setFilterAgent(e.target.value)}>
            <option value="">All agents</option>
            ${allAgents.map(n => html`<option key=${n} value=${n}>${n}</option>`)}
          </select>
          <button
            class=${`icon-btn${autoScroll ? ' active' : ''}`}
            onClick=${() => { const n = !autoScroll; setAutoScroll(n); autoScrollRef.current = n; }}
            title=${autoScroll ? 'Pause auto-scroll' : 'Resume auto-scroll'}
          >
            <span class="mi">${autoScroll ? 'pause' : 'play_arrow'}</span>
          </button>
        </div>

        <div class="stream-panel" ref=${streamRef} onScroll=${handleStreamScroll}>
          ${visible.length === 0
            ? html`<div class="stream-empty">${isQueued ? 'Pipeline queued — waiting to start.' : 'Waiting for agent activity…'}</div>`
            : visible.map(entry => html`<${StreamEntry} key=${entry._id} entry=${entry} />`)
          }
        </div>

        <${ComposeBar}
          target=${selectedAgent}
          agents=${agents}
          repoPath=${repo_path}
        />

        ${selectedAgent && selectedAgent !== 'consultant' && !isQueued && html`
          <${OutputDrawer}
            repoPath=${repo_path}
            selectedAgent=${selectedAgent}
            files=${outputFiles}
            onClose=${() => setSelectedAgent(null)}
          />
        `}
      </div>
    </div>
  `;
}

// ── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [defaultRepo,    setDefaultRepo]    = useState(() => localStorage.getItem('repoPath') ?? '');
  const [connected,      setConnected]      = useState(false);
  const [activeTab,      setActiveTab]      = useState('overview');
  const [pipelines,      setPipelines]      = useState({});
  const [pipelineOrder,  setPipelineOrder]  = useState([]);
  const [consultantState, setConsultantState] = useState({ status: 'idle', currentTool: null });
  const [consultantEvents, setConsultantEvents] = useState([]);
  const [showModal,      setShowModal]      = useState(null); // null | {mode, defaultRepo}
  const [planningMode,   setPlanningMode]   = useState(() => localStorage.getItem('planningMode') === 'true');
  const [pendingPipeline, setPendingPipeline] = useState(null); // formData waiting for planning

  const togglePlanningMode = () => setPlanningMode(prev => {
    const n = !prev; localStorage.setItem('planningMode', n); return n;
  });

  const handleNeedPlanning = (formData) => {
    setShowModal(null);
    // Wrap so PlanningModal can destructure { mode, formData }
    setPendingPipeline({ mode: formData.mode, formData });
  };

  const esRef              = useRef(null);
  const entryId            = useRef(0);
  const consultantEntryId  = useRef(0);
  const updateTimers       = useRef({});

  // Persist default repo
  useEffect(() => { localStorage.setItem('repoPath', defaultRepo); }, [defaultRepo]);

  // Load existing pipelines from server on mount
  useEffect(() => {
    fetch(`${API}/pipelines`)
      .then(r => r.json())
      .then(pls => {
        const map = {}, order = [];
        for (const pl of pls) {
          map[pl.pipeline_id] = {
            id: pl.pipeline_id, repo_path: pl.repo_path,
            label: shortPath(pl.repo_path), status: pl.status,
            task: pl.task_desc, skip_agents: new Set(pl.skip_agents),
            agent_overrides: pl.agent_overrides ?? {},
            agents: {}, agentOrder: [], stream: [],
          };
          order.push(pl.pipeline_id);
        }
        setPipelines(map); setPipelineOrder(order);
      }).catch(() => {});
  }, []);

  // Single unfiltered SSE connection — route events by pipeline_id
  useEffect(() => {
    const es = new EventSource(`${API}/stream`);
    esRef.current = es;
    es.onopen  = () => setConnected(true);
    es.onerror = () => setConnected(false);
    es.onmessage = (raw) => {
      let ev; try { ev = JSON.parse(raw.data); } catch { return; }
      const { type, agent, pipeline_id } = ev;

      // Consultant — route to global consultant state
      if (agent === 'consultant') {
        if      (type === 'agent_start')  setConsultantState(s => ({...s, status: 'in_progress', currentTool: null}));
        else if (type === 'tool_call')    setConsultantState(s => ({...s, currentTool: ev.data}));
        else if (type === 'agent_done')   setConsultantState(s => ({...s, status: 'done',        currentTool: null}));
        else if (type === 'agent_failed') setConsultantState(s => ({...s, status: 'failed',      currentTool: null}));
        if (['agent_start','thinking','tool_call','agent_done','agent_failed','user_interrupt','message'].includes(type))
          setConsultantEvents(prev => [...prev.slice(-300), {...ev, _id: ++consultantEntryId.current}]);
        return;
      }

      // Pipeline status / queued events
      if (type === 'pipeline_status') {
        setPipelines(prev => {
          const p = prev[pipeline_id]; if (!p) return prev;
          const terminal = ['stopped', 'failed'].includes(ev.data);
          const agents = terminal
            ? Object.fromEntries(Object.entries(p.agents).map(([k, v]) =>
                [k, v.status === 'in_progress' ? {...v, status: 'stopped', currentTool: null} : v]))
            : p.agents;
          return {...prev, [pipeline_id]: {...p, status: ev.data, agents}};
        });
        return;
      }
      if (type === 'pipeline_queued') return; // handled by onCreated callback

      // Per-pipeline agent events
      if (!pipeline_id) return;
      setPipelines(prev => {
        const p = prev[pipeline_id]; if (!p) return prev;
        let { agents, agentOrder, stream } = p;
        if      (type === 'agent_start')   { agents = {...agents, [agent]: {status: 'in_progress', currentTool: null}}; if (!agentOrder.includes(agent)) agentOrder = [...agentOrder, agent]; }
        else if (type === 'tool_call')     { if (agents[agent]) agents = {...agents, [agent]: {...agents[agent], currentTool: ev.data}}; }
        else if (type === 'agent_done')    { if (agents[agent]) agents = {...agents, [agent]: {...agents[agent], status: 'done',    currentTool: null}}; }
        else if (type === 'agent_failed')  { if (agents[agent]) agents = {...agents, [agent]: {...agents[agent], status: 'failed',  currentTool: null}}; }
        else if (type === 'agent_stopped') { if (agents[agent]) agents = {...agents, [agent]: {...agents[agent], status: 'stopped', currentTool: null}}; }
        if (['agent_start','thinking','tool_call','agent_done','agent_failed','agent_stopped','user_interrupt','message','research_pushed'].includes(type))
          stream = [...stream.slice(-MAX_STREAM + 1), {...ev, _id: ++entryId.current}];
        return {...prev, [pipeline_id]: {...p, agents, agentOrder, stream}};
      });
    };
    return () => { es.close(); esRef.current = null; };
  }, []);

  // Create a new pipeline tab after successful run/queue request
  const handlePipelineCreated = (pipeline_id, repo_path, task_desc, isQueued, skip_agents, agent_overrides) => {
    const p = {
      id: pipeline_id, repo_path, label: shortPath(repo_path),
      status: isQueued ? 'queued' : 'running', task: task_desc,
      skip_agents: skip_agents ?? new Set(),
      agent_overrides: agent_overrides ?? {},
      agents: {}, agentOrder: [], stream: [],
    };
    setPipelines(prev => ({...prev, [pipeline_id]: p}));
    setPipelineOrder(prev => [...prev, pipeline_id]);
    setActiveTab(pipeline_id);
    setShowModal(null);
    setDefaultRepo(repo_path);
  };

  // Skip toggle — updates state and debounces PATCH for queued pipelines
  const handleSkipToggle = (pipeline_id, agent_name) => {
    setPipelines(prev => {
      const p = prev[pipeline_id]; if (!p) return prev;
      const next = new Set(p.skip_agents);
      next.has(agent_name) ? next.delete(agent_name) : next.add(agent_name);
      const updated = {...p, skip_agents: next};
      if (p.status === 'queued') schedulePatch(pipeline_id, updated);
      return {...prev, [pipeline_id]: updated};
    });
  };

  // Pre-prompt change — updates state and debounces PATCH for queued pipelines
  const handleOverrideChange = (pipeline_id, agent_name, text) => {
    setPipelines(prev => {
      const p = prev[pipeline_id]; if (!p) return prev;
      const updated = {...p, agent_overrides: {...p.agent_overrides, [agent_name]: text}};
      if (p.status === 'queued') schedulePatch(pipeline_id, updated);
      return {...prev, [pipeline_id]: updated};
    });
  };

  const schedulePatch = (pipeline_id, p) => {
    clearTimeout(updateTimers.current[pipeline_id]);
    updateTimers.current[pipeline_id] = setTimeout(() => {
      fetch(`${API}/pipeline/update`, {
        method: 'PATCH', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({pipeline_id, skip_agents: [...p.skip_agents], agent_overrides: p.agent_overrides}),
      }).catch(() => {});
    }, 600);
  };

  // Close a tab: stop if active, then remove from state
  const handleCloseTab = async (pipeline_id, status) => {
    const active = ['running', 'paused'].includes(status);
    if (active) {
      try {
        await fetch(`${API}/pipeline/${pipeline_id}/control`, {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({action: 'stop'}),
        });
      } catch {}
    }
    setPipelines(prev => { const n = {...prev}; delete n[pipeline_id]; return n; });
    setPipelineOrder(prev => prev.filter(id => id !== pipeline_id));
    setActiveTab(prev => prev === pipeline_id ? 'overview' : prev);
  };

  // Pause / resume / stop a pipeline
  const handleControl = async (pipeline_id, action) => {
    try {
      const r = await fetch(`${API}/pipeline/${pipeline_id}/control`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action}),
      });
      const d = await r.json();
      if (d.status) {
        setPipelines(prev => {
          const p = prev[pipeline_id]; if (!p) return prev;
          return {...prev, [pipeline_id]: {...p, status: d.status}};
        });
      }
    } catch {}
  };

  // Skip / restart a specific agent in a pipeline
  const handleAgentControl = async (pipeline_id, agent, action) => {
    try {
      await fetch(`${API}/pipeline/${pipeline_id}/agent/${agent}/control`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action}),
      });
    } catch {}
  };

  // Resume a pipeline
  const handleResume = async (pipeline) => {
    try {
      const r = await fetch(`${API}/pipeline/resume`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({repo_path: pipeline.repo_path, skip_agents: [...pipeline.skip_agents]}),
      });
      const d = await r.json();
      if (d.pipeline_id) handlePipelineCreated(d.pipeline_id, pipeline.repo_path, pipeline.task, false, new Set(), {});
    } catch {}
  };

  const activePipeline = pipelines[activeTab];

  return html`
    <div class="root">
      ${pendingPipeline && html`
        <${PlanningModal}
          pendingPipeline=${pendingPipeline}
          onClose=${() => setPendingPipeline(null)}
          onCreated=${(pid, repo, desc, isQ, skipped, overrides) => { setPendingPipeline(null); handlePipelineCreated(pid, repo, desc, isQ, skipped, overrides); }}
        />
      `}
      ${showModal && showModal.mode === 'custom' && html`
        <${CustomPipelineModal}
          defaultRepo=${showModal.defaultRepo ?? defaultRepo}
          planningMode=${planningMode}
          onClose=${() => setShowModal(null)}
          onCreated=${handlePipelineCreated}
          onNeedPlanning=${handleNeedPlanning}
        />
      `}
      ${showModal && showModal.mode !== 'custom' && html`
        <${PipelineModal}
          mode=${showModal.mode}
          defaultRepo=${showModal.defaultRepo ?? defaultRepo}
          sourcePipelineId=${showModal.sourcePipelineId ?? ''}
          planningMode=${planningMode}
          onClose=${() => setShowModal(null)}
          onCreated=${handlePipelineCreated}
          onNeedPlanning=${handleNeedPlanning}
        />
      `}

      <div class="header">
        <div class="header-title">
          <span class="mi">account_tree</span> Orchestration
        </div>
        <div class="header-sep"></div>
        <button class=${`plan-toggle plan-toggle--${planningMode ? 'on' : 'off'}`}
          onClick=${togglePlanningMode}
          title=${planningMode ? 'Planning mode ON — agent will scope your task before running' : 'Planning mode OFF — click to enable'}>
          <span class="mi">psychology</span>
          Planning
        </button>
        <div class="header-sep"></div>
        <div class=${`conn-dot ${connected ? 'on' : 'off'}`} title=${connected ? 'Connected' : 'Disconnected'}></div>
      </div>

      <${TabBar}
        pipelines=${pipelineOrder.map(id => pipelines[id]).filter(Boolean)}
        activeTab=${activeTab}
        onSelect=${setActiveTab}
        onNew=${() => setShowModal({mode: 'new', defaultRepo})}
        onResearch=${() => setShowModal({mode: 'research', defaultRepo})}
        onScout=${() => setShowModal({mode: 'scout', defaultRepo})}
        onCustom=${() => setShowModal({mode: 'custom', defaultRepo})}
        onClose=${handleCloseTab}
      />

      <div class="tab-content">
        ${activeTab === 'overview'
          ? html`<${OverviewTab} pipelines=${pipelines} pipelineOrder=${pipelineOrder} onSelect=${setActiveTab} />`
          : html`<${PipelineTab}
              pipeline=${activePipeline}
              consultantAgentState=${consultantState}
              consultantEvents=${consultantEvents}
              onSkipToggle=${handleSkipToggle}
              onOverrideChange=${handleOverrideChange}
              onQueueNext=${(repo, pid) => setShowModal({mode: 'queue', defaultRepo: repo, sourcePipelineId: pid})}
              onResume=${handleResume}
              onControl=${handleControl}
              onAgentControl=${handleAgentControl}
            />`
        }
      </div>
    </div>
  `;
}

render(html`<${App} />`, document.getElementById('root'));
</script>
</body>
</html>
